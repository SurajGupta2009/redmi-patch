name: Build wlan_drv_gen4m.ko (radiotap monitor)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y git bc bison flex make python3 \
            libssl-dev libelf-dev dwarves build-essential unzip rsync cpio xz-utils zip file curl

      - name: Fetch Android clang r416183b
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/toolchains/clang-r416183b"
          cd "${HOME}/toolchains/clang-r416183b"
          curl -L -o /tmp/clang.tgz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz
          tar -xzf /tmp/clang.tgz
          "${HOME}/toolchains/clang-r416183b/bin/clang" --version

      - name: Clone kernel and MTK modules
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/redmi_monitor_build"
          git clone --depth=1 --branch spark-s-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git "${HOME}/redmi_monitor_build/kernel_spark"
          git clone --depth=1 --branch spark-s-oss https://github.com/MiCode/MTK_kernel_modules.git "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules"
          ln -sfn gen4-mt79xx "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m"

      - name: Force CFG_SUPPORT_SNIFFER_RADIOTAP=1
        run: |
          set -euxo pipefail
          MK="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile"
          sed -i '/CONFIG_SUPPORT_SNIFFER_RADIOTAP/,/endif/c\ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1\nccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1' "${MK}"
          grep -n SNIFFER_RADIOTAP "${MK}"

      - name: Fetch stock kernel_config
        run: |
          set -euxo pipefail
          curl -L -o "${HOME}/redmi_monitor_build/kernel_config.txt" \
            https://raw.githubusercontent.com/SurajGupta2009/redmi-patch/main/redmi_wifi_stack_extract/kernel_config.txt

      - name: Prepare kernel build environment
        run: |
          set -euxo pipefail
          # Directory Definitions
          BUILD_DIR="${HOME}/redmi_monitor_build"
          KERNEL_DIR="${BUILD_DIR}/kernel_spark"
          OUT_DIR="${KERNEL_DIR}/out"
          CONFIG_SRC="${BUILD_DIR}/kernel_config.txt"
          CONFIG_DST="${OUT_DIR}/.config"
          
          # Compiler Environment
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang-r416183b/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Initialize Output Directory
          mkdir -p "${OUT_DIR}"
          cp "${CONFIG_SRC}" "${CONFIG_DST}"
          cd "${KERNEL_DIR}"

          # ---- KMI / GKI symbol trimming fix for Xiaomi spark ----
          # The stock spark config has:
          #   CONFIG_TRIM_UNUSED_KSYMS=y
          #   CONFIG_UNUSED_KSYMS_WHITELIST="/mnt/disks/build-disk/.../abi_symbollist.raw"
          # That absolute path doesn't exist in CI, causing:
          #   ERROR: '.../abi_symbollist.raw' whitelist file not found
          #   make: *** [include/generated/autoksyms.h] Error 1
          #
          # olddefconfig re-enables TRIM_UNUSED_KSYMS via dependencies,
          # so we must strip it BEFORE first olddefconfig, AND AGAIN AFTER.
          
          # 1. Pre-strip – nuke everything KMI/GKI related from the raw config
          sed -i \
            -e '/CONFIG_TRIM_UNUSED_KSYMS/d' \
            -e '/CONFIG_UNUSED_KSYMS_WHITELIST/d' \
            -e '/CONFIG_KMI_SYMBOL_LIST/d' \
            -e '/abi_symbollist/d' \
            -e '\|/mnt/disks|d' \
            "${CONFIG_DST}"

          cat >> "${CONFIG_DST}" <<'KMI'
          # CONFIG_TRIM_UNUSED_KSYMS is not set
          CONFIG_UNUSED_KSYMS_WHITELIST=""
          # CONFIG_KMI_SYMBOL_LIST is not set
          CONFIG_KMI_SYMBOL_LIST=""
          KMI

          # 2. First olddefconfig
          make O="${OUT_DIR}" ARCH="${ARCH}" olddefconfig

          # 3. Post-strip – olddefconfig re-enables TRIM_UNUSED_KSYMS via Kconfig dependencies, kill it again
          ./scripts/config --file "${CONFIG_DST}" -d TRIM_UNUSED_KSYMS --set-str UNUSED_KSYMS_WHITELIST "" || true

          # Hard fallback – sed + append, idempotent
          sed -i \
            -e '/CONFIG_TRIM_UNUSED_KSYMS=y/d' \
            -e '/CONFIG_TRIM_UNUSED_KSYMS=.*y/d' \
            -e '/CONFIG_UNUSED_KSYMS_WHITELIST=/d' \
            -e '/CONFIG_KMI_SYMBOL_LIST=/d' \
            -e '/abi_symbollist/d' \
            -e '\|/mnt/disks|d' \
            "${CONFIG_DST}"

          grep -q "^# CONFIG_TRIM_UNUSED_KSYMS is not set" "${CONFIG_DST}" || echo "# CONFIG_TRIM_UNUSED_KSYMS is not set" >> "${CONFIG_DST}"
          grep -q "^CONFIG_UNUSED_KSYMS_WHITELIST=" "${CONFIG_DST}" || echo 'CONFIG_UNUSED_KSYMS_WHITELIST=""' >> "${CONFIG_DST}"

          # Verify – this MUST be empty / "is not set", otherwise modules_prepare will fail again
          echo "=== KMI sanify check ==="
          grep -E 'TRIM_UNUSED_KSYMS|UNUSED_KSYMS_WHITELIST|KMI_SYMBOL_LIST|abi_symbollist|/mnt/disks' "${CONFIG_DST}" || echo "clean – OK"

          if grep -q "CONFIG_TRIM_UNUSED_KSYMS=y" "${CONFIG_DST}"; then
            echo "ERROR: TRIM_UNUSED_KSYMS is still =y – modules_prepare will fail"
            exit 1
          fi

          # 4. Second olddefconfig with clean config
          make O="${OUT_DIR}" ARCH="${ARCH}" olddefconfig

          # 5. Final verify
          grep -E 'TRIM_UNUSED_KSYMS|UNUSED_KSYMS_WHITELIST' "${CONFIG_DST}" || true

          # Kernel Make Preparation
          make O="${OUT_DIR}" ARCH="${ARCH}" prepare modules_prepare -j"$(nproc)"

      - name: Build wlan_drv_gen4m.ko
        run: |
          set -euxo pipefail
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang-r416183b/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          cd "${HOME}/redmi_monitor_build"
          
          make -C kernel_spark O="${HOME}/redmi_monitor_build/kernel_spark/out" \
            M="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m" \
            MODULE_NAME=wlan_drv_gen4m \
            CONFIG_MTK_COMBO_WIFI_HIF=axi \
            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            modules -j"$(nproc)"
          
          find "${HOME}/redmi_monitor_build" -name wlan_drv_gen4m.ko -exec cp {} "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \;
          echo "=== vermagic ==="
          strings "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" | grep vermagic
          echo "=== radiotap / monitor symbols ==="
          strings "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" | grep -E 'radiotap|wlanMon|NL80211_IFTYPE_MONITOR|priv_driver_sniffer|wlanoidSetIcsSniffer' || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wlan_drv_gen4m-spark-radiotap
          path: wlan_drv_gen4m.ko
          retention-days: 14
