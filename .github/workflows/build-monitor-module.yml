            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            MTK_ANDROID_EMI=y \
            CONFIG_GKI_SUPPORT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            KBUILD_MODPOST_WARN=1 \
            ARCH=arm64 \
            SUBARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
