          cp "${KO}" "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"

          llvm-strip --strip-debug "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" || true

          echo "=== Built module ==="
          file "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          ls -lh "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" "${GITHUB_WORKSPACE}/wlan_drv_gen4m.unstripped.ko"

      - name: Verify patched module before packaging
        run: |
          set -euxo pipefail

          KO="${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          STOCK="${GITHUB_WORKSPACE}/${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko"

          echo "=== Vermagic ==="
          strings "${KO}" | grep '^vermagic='
          strings "${KO}" | grep -q "vermagic=${TARGET_VERMAGIC}"

          echo "=== Stock vermagic comparison ==="
          strings "${STOCK}" | grep '^vermagic='

          echo "=== __versions section ==="
          readelf -S "${KO}" | grep -q '__versions'
          readelf -S "${KO}" | grep '__versions'

          echo "=== Radiotap / monitor evidence ==="
          strings "${KO}" | grep -iE 'radiotap|wlanMon|CFG_SUPPORT_SNIFFER_RADIOTAP|NL80211_IFTYPE_MONITOR|ARPHRD_IEEE80211_RADIOTAP|priv_driver_sniffer|wlanoidSetIcsSniffer' | head -120

          if ! strings "${KO}" | grep -qiE 'radiotap|wlanMon|ARPHRD_IEEE80211_RADIOTAP'; then
            echo "ERROR: no radiotap/monitor evidence in module"
            exit 1
          fi

          echo "=== Undefined symbols in final module ==="
          readelf -sW "${KO}" | awk '$7=="UND"{print $8}' | sort -u | tee "${GITHUB_WORKSPACE}/undefined-symbols.txt"

          echo "=== Check known-bad imports from failed device logs ==="
          BAD='filp_open|kernel_read|kernel_write|kalValidateDevHandler|ioremap_nocache|ioremap_cache|gWifiRsvMemPhyBase|gWifiRsvMemSize|connectivity_flush_dcache_area|connectivity_arch_setup_dma_ops|dma_get_required_mask|get_dma_ops|dma_supported|platform_device_del|rstNotifyWholeChipRstStatus|set_logtoomuch_enable|get_logtoomuch_enable'

          if grep -E "^(${BAD})$" "${GITHUB_WORKSPACE}/undefined-symbols.txt"; then
            echo "ERROR: final module still contains known-bad unresolved imports"
            exit 1
          fi

          echo "=== Build log unresolved MODVERSIONS warnings (HARD FAIL) ==="
          echo "=== This previously said 'no symbol version for wakeup_source_add' and"
          echo "=== was only logged, never enforced -- that shipped a module which"
          echo "=== loaded but left Wi-Fi permanently stuck 'not ready' on device."
          if grep -inE 'no symbol version for|unknown symbol|undefined!' "${GITHUB_WORKSPACE}/build.log" \
              | tee "${GITHUB_WORKSPACE}/modversion-warnings.txt"; then
            if [ -s "${GITHUB_WORKSPACE}/modversion-warnings.txt" ]; then
              echo "ERROR: build produced symbols with no/unknown CRC version."
              echo "ERROR: the module would load but be ABI-unsafe / non-functional on device."
              echo "ERROR: add these symbols' CRCs to the synthetic Module.symvers, or patch"
              echo "ERROR: the source to avoid needing them (see wake-lock patch above for example)."
              exit 1
            fi
          fi

          echo "=== Cross-check every UND symbol has a real CRC in __versions section ==="
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import struct
          import sys

          # NOTE: this heredoc uses a QUOTED delimiter (<<'PY'), so bash does
          # NOT expand ${GITHUB_WORKSPACE} inside it -- that caused a real CI
          # failure ("readelf: Error: '${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko':
          # No such file") because the literal unexpanded string was passed to
          # readelf. Read it from the environment in Python instead, exactly
          # like the other python blocks in this workflow already do.
          ko = os.path.join(os.environ["GITHUB_WORKSPACE"], "wlan_drv_gen4m.ko")

          und = set()
          for line in subprocess.check_output(["readelf", "-sW", ko], text=True).splitlines():
              parts = line.split()
              if len(parts) >= 8 and parts[6] == "UND":
                  name = parts[7]
                  if name and not name.startswith("_"):
                      und.add(name)
                  elif name:
                      und.add(name)

          def read_versions_section(path):
              try:
                  text = subprocess.check_output(
                      ["readelf", "-x", "__versions", path],
                      text=True, stderr=subprocess.DEVNULL)
              except subprocess.CalledProcessError:
                  return b""
              data = bytearray()
              for line in text.splitlines():
                  m = re.match(r"\s*0x[0-9a-fA-F]+\s+((?:[0-9a-fA-F]{8}\s*){1,4})", line)
                  if not m:
                      continue
                  for word in m.group(1).split():
                      data.extend(bytes.fromhex(word))
              return bytes(data)

          data = read_versions_section(ko)
          versioned = set()
          for off in range(0, len(data) - 64 + 1, 64):
              rec = data[off:off + 64]
              crc = struct.unpack("<I", rec[:4])[0]
              raw = rec[8:].split(b"\x00", 1)[0]
              if not raw or crc == 0:
                  continue
              try:
                  name = raw.decode("ascii")
              except UnicodeDecodeError:
                  continue
              versioned.add(name)

          # Symbols that are resolved against other kernel modules (not vmlinux)
          # still show up as UND with no CRC entry of their own in some layouts;
          # cross-reference against modversion warnings we already hard-failed on
          # above, so here we only need to flag symbols with literally zero CRC
          # coverage anywhere, which is the exact failure mode that bit us.
          missing = sorted(s for s in und if s not in versioned)

          print(f"UND symbols: {len(und)}")
          print(f"Versioned (CRC) symbols: {len(versioned)}")
          if missing:
              print("Symbols with NO matching CRC entry in __versions section:")
              for m in missing:
                  print(f"  {m}")
              print(
                  "\nERROR: the symbols above have zero CRC coverage. This is exactly "
                  "the 'no symbol version for wakeup_source_add' failure mode that "
                  "loaded but left Wi-Fi permanently stuck 'not ready' on device. "
                  "Refusing to package this module."
              )
              sys.exit(1)

          print("OK: every UND symbol has CRC coverage in __versions section.")
          PY

          echo "=== Important module strings ==="
          strings "${KO}" | grep -E '^(name|depends|license|vermagic)=' || true

      - name: Build Magisk flashable module
        run: |
          set -euxo pipefail

          PKG="${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark"
          rm -rf "${PKG}"

          mkdir -p "${PKG}/system/vendor/lib/modules"

          if [ -d "${GITHUB_WORKSPACE}/magisk-module" ]; then
            cp -a "${GITHUB_WORKSPACE}/magisk-module/." "${PKG}/"
          fi

          cat > "${PKG}/module.prop" <<'EOF'
          id=redmi-wifi-monitor-spark
          name=Redmi Spark Built-in WiFi Monitor Mode
          version=0.2.0
          versionCode=2
          author=local
          description=Overrides wlan_drv_gen4m.ko with a radiotap monitor-mode enabled research build for Redmi Pad SE 8.7 4G spark.
          EOF

          cat > "${PKG}/customize.sh" <<'EOF'
          #!/system/bin/sh
          ui_print "============================================"
          ui_print " Redmi Spark Built-in WiFi Monitor Mode"
          ui_print "============================================"
          ui_print ""
          ui_print "This overlays /vendor/lib/modules/wlan_drv_gen4m.ko"
          ui_print "with a radiotap monitor-enabled build."
          ui_print ""
          ui_print "Recovery if Wi-Fi fails:"
          ui_print "  su"
          ui_print "  rm -rf /data/adb/modules/redmi-wifi-monitor-spark"
          ui_print "  reboot"
          ui_print ""
          ui_print "After reboot:"
          ui_print "  su"
          ui_print "  iw list | grep -A30 'Supported interface modes'"
          ui_print ""
          EOF

          touch "${PKG}/sepolicy.rule"

          cp "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \
            "${PKG}/system/vendor/lib/modules/wlan_drv_gen4m.ko"

          chmod 0644 "${PKG}/system/vendor/lib/modules/wlan_drv_gen4m.ko"

          cat > "${PKG}/README-INSTALL.txt" <<'EOF'
          Redmi Pad SE 8.7 4G spark Wi-Fi monitor-mode module.

          Recovery:
            su
            rm -rf /data/adb/modules/redmi-wifi-monitor-spark
            reboot

          Verify:
            su
            lsmod | grep wlan
            strings /vendor/lib/modules/wlan_drv_gen4m.ko | grep -iE 'vermagic|radiotap|wlanMon'
            dmesg | grep -iE 'wlan_drv_gen4m|unknown symbol|no symbol version|disagrees|vermagic|radiotap|monitor' | tail -100
            iw list | grep -A30 'Supported interface modes'

          Test monitor:
            su
            iw dev wlan0 interface add mon0 type monitor
            ip link set mon0 up
            iw dev
          EOF

          cd "${PKG}"
          zip -r "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark.zip" .

          ls -lh "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redmi-spark-radiotap-monitor-build
          path: |
            wlan_drv_gen4m.ko
            wlan_drv_gen4m.unstripped.ko
            redmi-wifi-monitor-spark.zip
            build.log
            undefined-symbols.txt
          if-no-files-found: warn
          retention-days: 14
