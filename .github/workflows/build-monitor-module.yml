          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p "${OUT_DIR}"
          cp "${CONFIG_SRC}" "${CONFIG_DST}"

          cd "${KERNEL_DIR}"

          cat > scripts/setlocalversion <<'EOF'
          #!/bin/sh
          echo "-android12-9+"
          EOF
          chmod +x scripts/setlocalversion

          sed -i 's/^CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "${CONFIG_DST}" || true

          if grep -q '^CONFIG_LOCALVERSION=' "${CONFIG_DST}"; then
            sed -i 's/^CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-android12-9+"/' "${CONFIG_DST}"
          else
