name: Build wlan_drv_gen4m.ko (radiotap monitor)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex make python3 \
            libssl-dev libelf-dev dwarves build-essential unzip rsync cpio xz-utils zip file curl

      - name: Fetch Android clang r416183b
        run: |
          set -eux
          mkdir -p $HOME/toolchains/clang-r416183b
          cd $HOME/toolchains/clang-r416183b
          curl -L -o /tmp/clang.tgz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz
          tar -xzf /tmp/clang.tgz
          $HOME/toolchains/clang-r416183b/bin/clang --version

      - name: Clone kernel + MTK modules
        run: |
          mkdir -p $HOME/redmi_monitor_build
          git clone --depth=1 --branch spark-s-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git $HOME/redmi_monitor_build/kernel_spark
          git clone --depth=1 --branch spark-s-oss https://github.com/MiCode/MTK_kernel_modules.git $HOME/redmi_monitor_build/vendor/mediatek/kernel_modules
          ln -sfn gen4-mt79xx $HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m

      - name: Force CFG_SUPPORT_SNIFFER_RADIOTAP=1
        run: |
          MK=$HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile
          sed -i '/CONFIG_SUPPORT_SNIFFER_RADIOTAP/,/endif/c\ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1\nccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1' "$MK"
          grep -n SNIFFER_RADIOTAP "$MK"

      - name: Fetch stock kernel_config
        run: |
          curl -L -o $HOME/redmi_monitor_build/kernel_config.txt \
            https://raw.githubusercontent.com/SurajGupta2009/redmi-patch/main/redmi_wifi_stack_extract/kernel_config.txt

      - name: Prepare kernel
        run: |
          export ARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH=$HOME/toolchains/clang-r416183b/bin:$PATH
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          cd $HOME/redmi_monitor_build/kernel_spark
          mkdir -p out
          cp $HOME/redmi_monitor_build/kernel_config.txt out/.config
          make O=out ARCH=arm64 olddefconfig
          make O=out ARCH=arm64 prepare modules_prepare -j$(nproc)

      - name: Build wlan_drv_gen4m.ko
        run: |
          export ARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH=$HOME/toolchains/clang-r416183b/bin:$PATH
          export CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          cd $HOME/redmi_monitor_build
          make -C kernel_spark O=$HOME/redmi_monitor_build/kernel_spark/out \
            M=$HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m \
            MODULE_NAME=wlan_drv_gen4m \
            CONFIG_MTK_COMBO_WIFI_HIF=axi MTK_COMBO_CHIP=CONNAC WLAN_CHIP_ID=6765 MTK_ANDROID_WMT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            modules -j$(nproc)
          find $HOME/redmi_monitor_build -name wlan_drv_gen4m.ko -exec cp {} $GITHUB_WORKSPACE/wlan_drv_gen4m.ko \;
          strings $GITHUB_WORKSPACE/wlan_drv_gen4m.ko | grep -E 'vermagic|radiotap|wlanMon'

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wlan_drv_gen4m-spark-radiotap
          path: wlan_drv_gen4m.ko
          retention-days: 14
