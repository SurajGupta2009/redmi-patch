name: Build wlan_drv_gen4m.ko (radiotap monitor)

on:
  workflow_dispatch:
    inputs:
      kernel_config_source:
        description: 'Where the stock kernel_config.txt comes from'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - redmi-patch-repo
  push:
    branches: [ main ]
    paths:
      - 'patches/**'
      - '.github/workflows/build-monitor-module.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git bc bison flex make python3 python3-pip \
            libssl-dev libelf-dev dwarves build-essential unzip rsync cpio xz-utils \
            ca-certificates curl

      - name: Fetch Android prebuilt clang
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          # AOSP clang r487747c - kernel 5.10 / Android 12 compatible
          curl -sL -o clang.tgz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz
          tar -xzf clang.tgz
          ls $HOME/toolchains/clang-r487747c/bin/ | head

      - name: Clone kernel source (MiCode spark-s-oss)
        run: |
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            $HOME/redmi_monitor_build/kernel_spark

      - name: Clone MTK kernel_modules (spark-s-oss)
        run: |
          mkdir -p $HOME/redmi_monitor_build/vendor/mediatek
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/MTK_kernel_modules.git \
            $HOME/redmi_monitor_build/vendor/mediatek/kernel_modules

      - name: Create gen4m symlink
        run: |
          GEN4_DIR=$HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core
          ln -sfn gen4-mt79xx $GEN4_DIR/gen4m
          ls -la $GEN4_DIR/

      - name: Apply radiotap-monitor Makefile patch
        run: |
          GEN4M_MK=$HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile
          cp $GEN4M_MK $GEN4M_MK.bak
          python3 - <<'PY'
from pathlib import Path
p = Path("$HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile")
s = p.read_text()
old = """ifeq ($(CONFIG_SUPPORT_SNIFFER_RADIOTAP), y)
    ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1
    ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1
else
    ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=0
    ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=0
endif"""
new = """# Force radiotap monitor support for Redmi Pad SE spark research build
ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1
ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1"""
if old not in s:
    s += "\n" + new + "\n"
else:
    s = s.replace(old, new)
p.write_text(s)
print("Makefile patched.")
PY
          grep -nE "CFG_SUPPORT_SNIFFER_RADIOTAP|CFG_SUPPORT_PDMA_SCATTER" $GEN4M_MK

      - name: Fetch stock kernel_config.txt
        run: |
          # The stock kernel config is needed for vermagic match.
          # If you have not uploaded it as a workflow file, download from
          # the redmi-patch repo's redmi_wifi_stack_extract/kernel_config.txt
          mkdir -p $HOME/redmi_monitor_build
          curl -sL -o $HOME/redmi_monitor_build/kernel_config.txt \
            https://raw.githubusercontent.com/SurajGupta2009/redmi-patch/main/redmi_wifi_stack_extract/kernel_config.txt
          head -5 $HOME/redmi_monitor_build/kernel_config.txt
          wc -l $HOME/redmi_monitor_build/kernel_config.txt

      - name: Fetch stock module for vermagic comparison
        run: |
          # Best-effort: try to pull from the redmi-patch extract tarball.
          curl -sL -o /tmp/extract.tgz \
            https://github.com/SurajGupta2009/redmi-patch/raw/main/redmi_wifi_stack_extract_20260705_111648.tar.gz || true
          if [ -s /tmp/extract.tgz ]; then
            cd /tmp && tar -xzf extract.tgz || true
            find /tmp -name 'wlan_drv_gen4m.ko' -type f -exec cp {} $HOME/redmi_monitor_build/stock_wlan_drv_gen4m.ko \;
          fi
          ls -la $HOME/redmi_monitor_build/stock_wlan_drv_gen4m.ko 2>/dev/null || echo "Stock module not pulled (will skip vermagic compare)"

      - name: Prepare kernel build environment
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH=$HOME/toolchains/clang-r487747c/bin:$PATH
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p $HOME/redmi_monitor_build/kernel_spark/out
          cp $HOME/redmi_monitor_build/kernel_config.txt $HOME/redmi_monitor_build/kernel_spark/out/.config

          cd $HOME/redmi_monitor_build/kernel_spark
          make O=out ARCH=arm64 olddefconfig
          make O=out ARCH=arm64 prepare modules_prepare

      - name: Build patched wlan_drv_gen4m.ko
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH=$HOME/toolchains/clang-r487747c/bin:$PATH
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          cd $HOME/redmi_monitor_build
          make -C kernel_spark O=kernel_spark/out \
            M=$PWD/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m \
            KERNEL_OUT=$PWD/kernel_spark/out \
            CONFIG_MTK_COMBO_WIFI_HIF=axi \
            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            modules 2>&1 | tail -n 200

      - name: Locate and verify patched module
        run: |
          PATCHED=$(find $HOME/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m \
                    -name 'wlan_drv_gen4m.ko' -type f | head -n1)
          echo "Patched module: $PATCHED"
          if [ -z "$PATCHED" ]; then
            echo "ERROR: build did not produce wlan_drv_gen4m.ko"
            exit 1
          fi
          mkdir -p out
          cp "$PATCHED" out/wlan_drv_gen4m.ko

          echo "==== vermagic ===="
          strings out/wlan_drv_gen4m.ko | grep vermagic

          echo "==== radiotap/monitor strings ===="
          strings out/wlan_drv_gen4m.ko | \
            grep -iE 'radiotap|NL80211_IFTYPE_MONITOR|CFG_SUPPORT_SNIFFER_RADIOTAP|wlanoidSetIcsSniffer' | head -30

          if [ -f $HOME/redmi_monitor_build/stock_wlan_drv_gen4m.ko ]; then
            echo "==== stock vs patched vermagic ===="
            STOCK_VM=$(strings $HOME/redmi_monitor_build/stock_wlan_drv_gen4m.ko | grep -o 'vermagic=[^ ]*' | head -1)
            PATCHED_VM=$(strings out/wlan_drv_gen4m.ko | grep -o 'vermagic=[^ ]*' | head -1)
            echo "Stock:    $STOCK_VM"
            echo "Patched:  $PATCHED_VM"
            if [ "$STOCK_VM" = "$PATCHED_VM" ]; then
              echo "OK: vermagic matches."
            else
              echo "WARN: vermagic mismatch - module will fail to insmod on device."
            fi
          fi

      - name: Package as Magisk module
        run: |
          chmod +x scripts/package_magisk_module.sh
          ./scripts/package_magisk_module.sh out/wlan_drv_gen4m.ko

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redmi-wifi-monitor-spark-build
          path: |
            out/wlan_drv_gen4m.ko
            redmi-wifi-monitor-spark-*.zip
          if-no-files-found: error
          retention-days: 14
