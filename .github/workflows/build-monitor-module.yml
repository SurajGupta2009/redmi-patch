name: Build wlan_drv_gen4m.ko (radiotap monitor)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- CLANG – apt + cache, googlesource is blocked in CI ----------
      - name: Cache clang toolchain
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ~/toolchains/clang
          key: clang-14-ubuntu22-${{ runner.os }}-v3
          restore-keys: |
            clang-14-ubuntu22-

      - name: Install clang + cross tools
        run: |
          set -euxo pipefail
          if [ ! -x "${HOME}/toolchains/clang/bin/clang" ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              git bc bison flex make python3 \
              libssl-dev libelf-dev dwarves build-essential \
              unzip rsync cpio xz-utils zip file curl ca-certificates \
              clang-14 lld-14 llvm-14 \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
              gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi
            mkdir -p "${HOME}/toolchains/clang/bin"
            for t in clang clang++ ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-strip llvm-readelf; do
              if [ -e "/usr/bin/${t}-14" ]; then ln -sf "/usr/bin/${t}-14" "${HOME}/toolchains/clang/bin/${t}"; fi
              [ -e "/usr/bin/${t}" ] && ln -sf "/usr/bin/${t}" "${HOME}/toolchains/clang/bin/${t}" || true
            done
            for t in clang clang++; do
              [ -x "${HOME}/toolchains/clang/bin/${t}" ] || ln -sf "/usr/bin/${t}-14" "${HOME}/toolchains/clang/bin/${t}"
            done
          fi
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          clang --version | head -1
          aarch64-linux-gnu-gcc --version | head -1

      # ---------- SOURCE ----------
      - name: Clone kernel and MTK modules
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/redmi_monitor_build"
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            "${HOME}/redmi_monitor_build/kernel_spark"
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/MTK_kernel_modules.git \
            "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules"
          ln -sfn gen4-mt79xx \
            "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m"

      - name: Force CFG_SUPPORT_SNIFFER_RADIOTAP=1
        run: |
          set -euxo pipefail
          MK="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile"
          sed -i '/CONFIG_SUPPORT_SNIFFER_RADIOTAP/,/endif/c\ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1\nccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1' "${MK}"
          grep -n SNIFFER_RADIOTAP "${MK}"

      # ---------- LINUX 5.10 COMPAT – gen4-mt79xx ----------
      # MiCode MTK_kernel_modules spark-s-oss does NOT build clean against
      # MiCode/Xiaomi_Kernel_OpenSource spark-s-oss 5.10 without shims.
      - name: Apply Linux 5.10 compat patches – gen4-mt79xx
        run: |
          set -euxo pipefail
          WLAN="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx"
          cd "$WLAN"

          # 1. config.h – kernel API shims that are safe as macros
          # NOTE: do NOT define eSuspendtate here – we stub the function in hal_pdma.c instead,
          # otherwise a naive sed turns rHifInfo.eSuspendtate into rHifInfo.0 which is invalid C
          perl -0777 -i -pe 's/(#define _CONFIG_H)/$1\n\n\/\* spark 5.10 compat – Redmi Pad SE monitor build *\/\n#include <linux\/version.h>\n#if LINUX_VERSION_CODE >= KERNEL_VERSION(5,10,0)\n#ifndef ioremap_nocache\n#define ioremap_nocache ioremap\n#endif\n#ifndef get_dma_ops\n#define get_dma_ops(dev) NULL\n#endif\n#endif\n#ifndef PCIE_STATE_SUSPEND_ENTERING\n#define PCIE_STATE_SUSPEND_ENTERING 0\n#endif\n\/\* end compat *\/\n/s' include/config.h

          # 2. Relax -Werror globally
          echo 'ccflags-y += -Wno-error -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-int-conversion -Wno-unused-function -Wno-unused-variable -Wno-misleading-indentation' >> Makefile
          find os/linux/hif -name Makefile -exec sh -c 'echo "ccflags-y += -Wno-error" >> "$1"' _ {} \;

          # 3. hal_pdma.c – halPdmaGetSuspendState – struct GL_HIF_INFO has no eSuspendtate field in 5.10 spark kernel
          # Replace the entire function with a stub BEFORE any other sed runs, so we never get rHifInfo.0 syntax corruption
          HIF_PDMA=os/linux/hif/common/hal_pdma.c
          # try a proper function-level replace
          perl -0777 -i -pe 'BEGIN{undef $/} s/uint32_t\s+halPdmaGetSuspendState\s*\(\s*IN\s+struct\s+ADAPTER\s*\*prAdapter\s*,\s*uint8_t\s*\*pucState\s*\)\s*\{.*?\n\}\n/s/uint32_t halPdmaGetSuspendState(IN struct ADAPTER *prAdapter, uint8_t *pucState) { if (pucState) *pucState = 0; return false; }\n/smg' "$HIF_PDMA" || true
          # Fallback – if perl didn't match (different formatting in this checkout), nuke the bad member accesses with a FULL expression replace, NOT just the field name
          #   WRONG: sed 's/eSuspendtate/0/g'  -> produces rHifInfo.0  -> compile error
          #   RIGHT: sed 's/prAdapter->prGlueInfo->rHifInfo\.eSuspendtate/0/g'
          sed -i 's/prAdapter->prGlueInfo->rHifInfo\.eSuspendtate/0/g; s/PCIE_STATE_SUSPEND_ENTERING/0/g' "$HIF_PDMA" || true
          # if the function still contains "rHifInfo.0" the previous sed was too greedy – fix it
          sed -i 's/rHifInfo\.0/0/g' "$HIF_PDMA" || true

          # Verify hal_pdma compiles as a standalone unit – fail fast here instead of 10 min into the full build
          echo "--- hal_pdma suspend_state check ---"
          if grep -q "rHifInfo\.0\|rHifInfo\.eSuspendtate" "$HIF_PDMA"; then
            echo "ERROR: hal_pdma.c still contains broken suspend state access:"
            grep -n "rHifInfo\." "$HIF_PDMA" | grep -E "eSuspend|\\.0"
            exit 1
          fi

          # 4. axi.c – 5.10 API fixes
          AXI=os/linux/hif/axi/axi.c
          sed -i 's/ioremap_nocache/ioremap/g' "$AXI"
          sed -i 's/get_dma_ops([^)]*)/NULL/g' "$AXI"
          sed -i 's/init_timer(\([^)]*\));/timer_setup(\1, NULL, 0);/g' "$AXI"
          sed -i '/rSerTimer\.data/d; /rSerTimer\.function/d' "$AXI"

          # copyTxData signature – kernel 5.10 expects 4 args, MTK gives 3
          # inject a compat wrapper if not present
          if ! grep -q "axiCopyTxData_compat" "$AXI"; then
            # insert wrapper before the axiMemOps struct definition
            awk '
            BEGIN{p=1}
            /static const struct HIF_MEM_OPS axiMemOps/ && p {
              print "#if LINUX_VERSION_CODE >= KERNEL_VERSION(5,10,0)"
              print "static bool axiCopyTxData_compat(struct MSDU_TOKEN_ENTRY *prToken, void *pvPkt, uint32_t u4Len, uint32_t u4Extra) {"
              print "    extern bool axiCopyTxData(struct MSDU_TOKEN_ENTRY *, void *, uint32_t);"
              print "    return axiCopyTxData(prToken, pvPkt, u4Len);"
              print "}"
              print "#define axiCopyTxData axiCopyTxData_compat"
              print "#endif"
              p=0
            }
            {print}
            ' "$AXI" > "$AXI.tmp" && mv "$AXI.tmp" "$AXI"
          fi
          sed -i 's/\.copyTxData\s*=\s*axiCopyTxData/.copyTxData = axiCopyTxData_compat/g' "$AXI" || true

          echo "--- compat check ---"
          if grep -rn "rHifInfo\.0\|rHifInfo\.eSuspendtate\|get_dma_ops\|ioremap_nocache[^)]" --include="*.c" --include="*.h" os/linux/hif/ | grep -v "define\|#ifndef\|//\|/\*"; then
            echo "WARNING: unpatched symbols remain in hif/ – build may still fail"
          else
            echo "hif/ compat clean – OK"
          fi

      - name: Fetch stock kernel_config
        run: |
          set -euxo pipefail
          curl -L -o "${HOME}/redmi_monitor_build/kernel_config.txt" \
            https://raw.githubusercontent.com/SurajGupta2009/redmi-patch/main/redmi_wifi_stack_extract/kernel_config.txt
          wc -l "${HOME}/redmi_monitor_build/kernel_config.txt"

      - name: Prepare kernel build environment
        run: |
          set -euxo pipefail
          BUILD_DIR="${HOME}/redmi_monitor_build"
          KERNEL_DIR="${BUILD_DIR}/kernel_spark"
          OUT_DIR="${KERNEL_DIR}/out"
          CONFIG_SRC="${BUILD_DIR}/kernel_config.txt"
          CONFIG_DST="${OUT_DIR}/.config"

          export ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p "${OUT_DIR}"
          cp "${CONFIG_SRC}" "${CONFIG_DST}"
          cd "${KERNEL_DIR}"

          # ---- KMI / GKI symbol trimming fix – Xiaomi spark ----
          # Stock config: CONFIG_TRIM_UNUSED_KSYMS=y
          # CONFIG_UNUSED_KSYMS_WHITELIST="/mnt/disks/build-disk/.../abi_symbollist.raw"
          # → modules_prepare fails. olddefconfig re-enables it, so strip BEFORE and AFTER.

          # 1. Pre-strip
          sed -i \
            -e '/CONFIG_TRIM_UNUSED_KSYMS/d' \
            -e '/CONFIG_UNUSED_KSYMS_WHITELIST/d' \
            -e '/CONFIG_KMI_SYMBOL_LIST/d' \
            -e '/abi_symbollist/d' \
            -e '\|/mnt/disks|d' \
            "${CONFIG_DST}"

          # Avoid heredoc in YAML to prevent parsing failures, use echo append
          echo "# CONFIG_TRIM_UNUSED_KSYMS is not set" >> "${CONFIG_DST}"
          echo 'CONFIG_UNUSED_KSYMS_WHITELIST=""' >> "${CONFIG_DST}"
          echo "# CONFIG_KMI_SYMBOL_LIST is not set" >> "${CONFIG_DST}"
          echo 'CONFIG_KMI_SYMBOL_LIST=""' >> "${CONFIG_DST}"

          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 olddefconfig

          # 2. Post-strip
          ./scripts/config --file "${CONFIG_DST}" -d TRIM_UNUSED_KSYMS --set-str UNUSED_KSYMS_WHITELIST "" || true
          sed -i \
            -e '/CONFIG_TRIM_UNUSED_KSYMS=y/d' \
            -e '/CONFIG_UNUSED_KSYMS_WHITELIST=/d' \
            -e '/CONFIG_KMI_SYMBOL_LIST=/d' \
            -e '/abi_symbollist/d' \
            -e '\|/mnt/disks|d' \
            "${CONFIG_DST}"
            
          grep -q "^# CONFIG_TRIM_UNUSED_KSYMS is not set" "${CONFIG_DST}" || echo "# CONFIG_TRIM_UNUSED_KSYMS is not set" >> "${CONFIG_DST}"
          grep -q "^CONFIG_UNUSED_KSYMS_WHITELIST=" "${CONFIG_DST}" || echo 'CONFIG_UNUSED_KSYMS_WHITELIST=""' >> "${CONFIG_DST}"

          echo "=== KMI sanity check ==="
          grep -E 'TRIM_UNUSED_KSYMS|UNUSED_KSYMS_WHITELIST|KMI_SYMBOL_LIST|abi_symbollist|/mnt/disks' "${CONFIG_DST}" || echo "clean – OK"
          if grep -q "CONFIG_TRIM_UNUSED_KSYMS=y" "${CONFIG_DST}"; then
            echo "ERROR: TRIM_UNUSED_KSYMS still =y"
            exit 1
          fi

          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 olddefconfig
          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 prepare modules_prepare -j"$(nproc)"

      - name: Build wlan_drv_gen4m.ko
        run: |
          set -euxo pipefail
          export ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          cd "${HOME}/redmi_monitor_build"

          make -C kernel_spark O="${HOME}/redmi_monitor_build/kernel_spark/out" \
            M="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m" \
            MODULE_NAME=wlan_drv_gen4m \
            CONFIG_MTK_COMBO_WIFI_HIF=axi \
            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            modules -j"$(nproc)"

          find "${HOME}/redmi_monitor_build" -name wlan_drv_gen4m.ko -exec cp -v {} "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \;

          echo "=== file ==="
          file "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          echo "=== vermagic ==="
          strings "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" | grep vermagic
          echo "=== radiotap / monitor symbols ==="
          strings "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" | grep -E 'radiotap|wlanMon|NL80211_IFTYPE_MONITOR|priv_driver_sniffer|wlanoidSetIcsSniffer' || true

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: wlan_drv_gen4m-spark-radiotap
          path: wlan_drv_gen4m.ko
          if-no-files-found: error
          retention-days: 14
