name: Build wlan_drv_gen4m.ko (radiotap monitor)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- CLANG – apt + cache ----------
      - name: Cache clang toolchain
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ~/toolchains/clang
          key: clang-14-ubuntu22-${{ runner.os }}-v3
          restore-keys: |
            clang-14-ubuntu22-

      - name: Install clang + cross tools
        run: |
          set -euxo pipefail
          if [ ! -x "${HOME}/toolchains/clang/bin/clang" ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              git bc bison flex make python3 \
              libssl-dev libelf-dev dwarves build-essential \
              unzip rsync cpio xz-utils zip file curl ca-certificates \
              clang-14 lld-14 llvm-14 \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
              gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi
            mkdir -p "${HOME}/toolchains/clang/bin"
            for t in clang clang++ ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-strip llvm-readelf; do
              [ -e "/usr/bin/${t}-14" ] && ln -sf "/usr/bin/${t}-14" "${HOME}/toolchains/clang/bin/${t}" || true
              [ -e "/usr/bin/${t}" ] && ln -sf "/usr/bin/${t}" "${HOME}/toolchains/clang/bin/${t}" || true
            done
            for t in clang clang++; do
              [ -x "${HOME}/toolchains/clang/bin/${t}" ] || ln -sf "/usr/bin/${t}-14" "${HOME}/toolchains/clang/bin/${t}"
            done
          fi
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          clang --version | head -1

      # ---------- SOURCE ----------
      - name: Clone kernel and MTK modules
        run: |
          set -euxo pipefail
          mkdir -p "${HOME}/redmi_monitor_build"
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            "${HOME}/redmi_monitor_build/kernel_spark"
          git clone --depth=1 --branch spark-s-oss \
            https://github.com/MiCode/MTK_kernel_modules.git \
            "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules"
          ln -sfn gen4-mt79xx \
            "${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m"

      - name: Force CFG_SUPPORT_SNIFFER_RADIOTAP=1
        run: |
          set -euxo pipefail
          MK="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx/Makefile"
          sed -i '/CONFIG_SUPPORT_SNIFFER_RADIOTAP/,/endif/c\ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1\nccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1' "${MK}"

      # ---------- ALL-IN-ONE COMPAT SHIMS & KBUILD FIXES ----------
      - name: Apply Linux 5.10 / AXI compat & Kbuild fixes
        run: |
          set -euxo pipefail
          WLAN="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx"
          cd "$WLAN"

          # 1. Fix Kbuild .mod bug for non-SDIO (AXI) interfaces when CONFIG_GKI_SUPPORT=y
          sed -i -e 's/\$(MODULE_NAME_RESET)-objs += \$(RESET_OBJS)/ifneq (\$(MODULE_NAME_RESET),)\n\$(MODULE_NAME_RESET)-objs += \$(RESET_OBJS)/' -e 's/obj-m += \$(MODULE_NAME_RESET)\.o/obj-m += \$(MODULE_NAME_RESET)\.o\nendif/' Makefile

          # 2. Convert -Werror to -Wno-error and append Clang-safe warning suppressions
          sed -i 's/-Werror/-Wno-error/g' Makefile
          echo 'ccflags-y += -Wno-error -Wno-unknown-warning-option -Wno-implicit-function-declaration -Wno-incompatible-pointer-types -Wno-int-conversion -Wno-unused-function -Wno-unused-variable -Wno-unused-but-set-variable -Wno-misleading-indentation -Wno-address-of-packed-member -Wno-format -Wno-missing-prototypes -Wno-pointer-sign' >> Makefile

          # 3. Fix halIsHifStateReady in hal_pdma.c (eSuspendtate is PCIe-only, missing in AXI GL_HIF_INFO)
          python3 -c '
          import re
          with open("os/linux/hif/common/hal_pdma.c", "r") as f:
              c = f.read()
          pattern = r"bool\s+halIsHifStateReady\s*\(.*?\)\s*\{.*?\n\}"
          replacement = """bool halIsHifStateReady(IN struct ADAPTER *prAdapter, uint8_t *pucState)
          {
          \tif (!prAdapter || !prAdapter->prGlueInfo || prAdapter->prGlueInfo->u4ReadyFlag == 0)
          \t\treturn FALSE;

          #if defined(_HIF_PCIE)
          \tif (pucState)
          \t\t*pucState = prAdapter->prGlueInfo->rHifInfo.eSuspendtate;
          \tif (prAdapter->prGlueInfo->rHifInfo.eSuspendtate == PCIE_STATE_SUSPEND_ENTERING)
          \t\treturn FALSE;
          #else
          \tif (pucState)
          \t\t*pucState = 0;
          #endif

          \treturn TRUE;
          }"""
          c_new = re.sub(pattern, replacement, c, count=1, flags=re.DOTALL)
          if c_new != c:
              with open("os/linux/hif/common/hal_pdma.c", "w") as f:
                  f.write(c_new)
              print("hal_pdma.c regex patched successfully!")
          else:
              print("hal_pdma.c pattern not found or already patched!")
          '

          # 4. Fix legacy timer API in axi.c (init_timer -> timer_setup for Linux >= 4.15)
          python3 -c '
          import re
          with open("os/linux/hif/axi/axi.c", "r") as f:
              c = f.read()
          pattern = r"init_timer\(&prHif->rSerTimer\);\s*prHif->rSerTimer\.function\s*=\s*halHwRecoveryTimeout;\s*prHif->rSerTimer\.data\s*=\s*\(unsigned long\)prGlueInfo;\s*prHif->rSerTimer\.expires\s*=\s*jiffies\s*\+\s*HIF_SER_TIMEOUT\s*\*\s*HZ\s*/\s*MSEC_PER_SEC;"
          replacement = """#if KERNEL_VERSION(4, 15, 0) <= LINUX_VERSION_CODE
          \ttimer_setup(&prHif->rSerTimer, halHwRecoveryTimeout, 0);
          #else
          \tinit_timer(&prHif->rSerTimer);
          \tprHif->rSerTimer.function = halHwRecoveryTimeout;
          \tprHif->rSerTimer.data = (unsigned long)prGlueInfo;
          \tprHif->rSerTimer.expires =
          \t\tjiffies + HIF_SER_TIMEOUT * HZ / MSEC_PER_SEC;
          #endif"""
          c_new = re.sub(pattern, replacement, c, count=1, flags=re.DOTALL)
          if c_new != c:
              with open("os/linux/hif/axi/axi.c", "w") as f:
                  f.write(c_new)
              print("axi.c timer regex patched successfully!")
          else:
              print("axi.c timer pattern not found or already patched!")
          '

          # 5. Fix mt66xx_chip_info struct mismatch (debug info hooks moved to debug_ops in Linux 5.10)
          find chips/ -type f -name "*.c" -exec sed -i '/\.show_mcu_debug_info\s*=\s*NULL/d; /\.show_conninfra_debug_info\s*=\s*NULL/d' {} +

          echo "=== ALL PATTERN SHIMS APPLIED CLEANLY ==="

      # ---------- KERNEL PREPARE & SYMBOL TABLE BUILD ----------
      - name: Fetch stock kernel_config
        run: |
          set -euxo pipefail
          curl -L -o "${HOME}/redmi_monitor_build/kernel_config.txt" \
            https://raw.githubusercontent.com/SurajGupta2009/redmi-patch/main/redmi_wifi_stack_extract/kernel_config.txt

      - name: Prepare kernel & generate genuine Module.symvers
        run: |
          set -euxo pipefail
          BUILD_DIR="${HOME}/redmi_monitor_build"
          KERNEL_DIR="${BUILD_DIR}/kernel_spark"
          OUT_DIR="${KERNEL_DIR}/out"
          CONFIG_SRC="${BUILD_DIR}/kernel_config.txt"
          CONFIG_DST="${OUT_DIR}/.config"

          export ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          mkdir -p "${OUT_DIR}"
          cp "${CONFIG_SRC}" "${CONFIG_DST}"
          cd "${KERNEL_DIR}"

          # Override setlocalversion script to always print exactly '-android12-9+'
          # This prevents both missing localversion (5.10.198) and double-plus dirty git flags (-android12-9++)
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo "-android12-9+"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion

          # Ensure localversion matches stock (-android12-9+) and disable git hash append
          sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' "${CONFIG_DST}" || true
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="-android12-9+"/' "${CONFIG_DST}" || true

          # KMI / GKI symbol trimming – Xiaomi config points to /mnt/disks/…/abi_symbollist.raw
          sed -i -e '/CONFIG_TRIM_UNUSED_KSYMS/d' -e '/CONFIG_UNUSED_KSYMS_WHITELIST/d' -e '/CONFIG_KMI_SYMBOL_LIST/d' -e '/abi_symbollist/d' -e '\|/mnt/disks|d' "${CONFIG_DST}"
          
          # Indented echo statements instead of flush-left heredocs to guarantee valid YAML syntax
          echo '# CONFIG_TRIM_UNUSED_KSYMS is not set' >> "${CONFIG_DST}"
          echo 'CONFIG_UNUSED_KSYMS_WHITELIST=""' >> "${CONFIG_DST}"
          echo '# CONFIG_KMI_SYMBOL_LIST is not set' >> "${CONFIG_DST}"
          echo 'CONFIG_KMI_SYMBOL_LIST=""' >> "${CONFIG_DST}"

          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 olddefconfig

          ./scripts/config --file "${CONFIG_DST}" -d TRIM_UNUSED_KSYMS --set-str UNUSED_KSYMS_WHITELIST "" || true
          sed -i -e '/CONFIG_TRIM_UNUSED_KSYMS=y/d' -e '/CONFIG_UNUSED_KSYMS_WHITELIST=/d' -e '/CONFIG_KMI_SYMBOL_LIST=/d' -e '/abi_symbollist/d' -e '\|/mnt/disks|d' "${CONFIG_DST}"
          grep -q "^# CONFIG_TRIM_UNUSED_KSYMS is not set" "${CONFIG_DST}" || echo "# CONFIG_TRIM_UNUSED_KSYMS is not set" >> "${CONFIG_DST}"
          grep -q "^CONFIG_UNUSED_KSYMS_WHITELIST=" "${CONFIG_DST}" || echo 'CONFIG_UNUSED_KSYMS_WHITELIST=""' >> "${CONFIG_DST}"

          if grep -q "CONFIG_TRIM_UNUSED_KSYMS=y" "${CONFIG_DST}"; then echo "ERROR: TRIM_UNUSED_KSYMS still =y"; exit 1; fi

          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 olddefconfig
          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 prepare modules_prepare -j"$(nproc)"
          
          # Native symbol table build: generates genuine out/Module.symvers with valid symbol CRCs
          echo "=== Building vmlinux and core modules for symbol CRC generation ==="
          make O="${OUT_DIR}" ARCH="${ARCH}" LLVM=1 vmlinux modules -j"$(nproc)" || true
          
          if [ -f "${OUT_DIR}/Module.symvers" ]; then
            echo "=== Module.symvers generated successfully ==="
            ls -la "${OUT_DIR}/Module.symvers"
          else
            echo "=== WARNING: Module.symvers not generated by core build, proceeding with module link ==="
          fi

      # ---------- BUILD MODULE ----------
      - name: Build wlan_drv_gen4m.ko
        run: |
          set -euxo pipefail
          export ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          cd "${HOME}/redmi_monitor_build"

          # Build with full log capture – always upload build.log even on failure
          set +e
          make -C kernel_spark O="${HOME}/redmi_monitor_build/kernel_spark/out" \
            M="${HOME}/redmi_monitor_build/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m" \
            MODULE_NAME=wlan_drv_gen4m \
            CONFIG_MTK_COMBO_WIFI_HIF=axi \
            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            ARCH=arm64 SUBARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            modules -j"$(nproc)" 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          find "${HOME}/redmi_monitor_build" -name wlan_drv_gen4m.ko -exec cp -v {} "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \; || true

          if [ -f "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" ]; then
            echo "=== BUILD SUCCESS ==="
            file "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
            strings "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" | grep -E 'vermagic|radiotap|wlanMon|NL80211_IFTYPE_MONITOR|priv_driver_sniffer' | head -30
          else
            echo "=== BUILD FAILED – see build.log ==="
            tail -200 "${GITHUB_WORKSPACE}/build.log" || true
          fi
          exit $BUILD_STATUS

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wlan_drv_gen4m-spark-build
          path: |
            wlan_drv_gen4m.ko
            build.log
          if-no-files-found: warn
          retention-days: 14
