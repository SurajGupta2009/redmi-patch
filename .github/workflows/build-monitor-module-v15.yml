name: Build Redmi Spark wlan_drv_gen4m.ko Radiotap Monitor [v15]

# v15 = v14 minus the wake-lock regression.
#
# v14 shipped a working, radiotap-enabled .ko that installed cleanly
# via Magisk. On boot, init.rc ran
#   insmod /vendor/lib/modules/wlan_drv_gen4m.ko
# and the KERNEL rejected the module with:
#   [15.119009] wlan_drv_gen4m: disagrees about version of symbol wakeup_source_add
#   [15.119033] wlan_drv_gen4m: Unknown symbol wakeup_source_add (err -22)
#   [15.127214] init: ... finit_module ... failed: Invalid argument
# and then userspace's wlan_assistant spammed 116x
#   [MTK-WIFI] WIFI_write[E]: Wi-Fi driver is not ready for 2s
# because /dev/wmtWifi had no driver bound.
#
# Root cause: v14's D3 injected 0xdeadbeef as a PLACEHOLDER CRC for
# wakeup_source_add/remove into Module.symvers. Placeholder CRCs work
# only when the kernel is built WITHOUT CONFIG_MODULE_FORCE_LOAD or the
# module has a matching depends= entry, so modversions verification
# falls back to "warning, not error". On this kernel/config combo,
# the mismatch is a hard rejection.
#
# There are two clean fixes; v15 chooses the SIMPLER one that we KNOW
# worked on v12 (v12 loaded fine at boot -- the panic was CFI, not
# wake-lock):
#   FIX: put the v11.3 wake-lock HEADER patch BACK. It forces the
#        preprocessor into the pre-5.1 branch of the wake-lock macros,
#        so the module imports wakeup_source_REGISTER / _UNREGISTER
#        (which stock wlan_drv_gen4m.ko also imports -> real CRCs
#        available in our stock-scraped Module.symvers) instead of
#        wakeup_source_ADD / _REMOVE (which no stock .ko imports).
#        No placeholder CRCs needed anywhere.
#
# v15 diff vs v14:
#   D2') RESTORE the v11.3 gl_kal.h wake-lock header patch.
#        (Undoes v13/v14's D2 revert.)
#   D3') REMOVE the wakeup_source_* placeholder CRC injection.
#        (Undoes v13/v14's D3.)
#   D1)  KEEP -fno-sanitize=cfi. This is the fix for the v12 panic.
#   D4)  KEEP the fixed verify step. But relax the "__cfi_check must
#        be absent" check -- the symbol is always emitted as a
#        28-byte stub by the module framework even when CFI is off;
#        check the size, not the presence.
#   D5,D6) KEEP everything else from v14 (dual zip packaging, always-
#        upload artifacts, etc.), rename v14 -> v15.
#
# History for context:
#   v11.3: real overlay boots, Wi-Fi glue deadlocks ("not ready" loop)
#          because Android wlan_assistant NVRAM handler wasn't registered
#          -- fixed by config.h NVRAM=1 + PERSIST_NETDEV=0 patches.
#   v12  : boots, Wi-Fi ~works, panics at t=38s from CFI type-ID
#          mismatch on wmt_drv reset-message callback.
#   v13  : killed in CI (clang-12 doesn't accept -fno-sanitize=kcfi).
#   v14  : built cleanly, but module REJECTED at insmod time due to
#          wake-lock CRC placeholder (0xdeadbeef) mismatch.
#   v15  : puts v11.3's wake-lock header patch back so we use the
#          register/unregister API (real CRCs), keeps CFI-off from v14,
#          drops the placeholder CRC injection.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      BUILD_DIR: /home/runner/redmi_monitor_build
      KERNEL_BRANCH: spark-s-oss
      STOCK_EXTRACT_DIR: redmi_wifi_stack_extract
      TARGET_VERMAGIC: "5.10.198-android12-9+ SMP preempt mod_unload modversions aarch64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git bc bison flex make python3 \
            libssl-dev libelf-dev dwarves build-essential \
            unzip rsync cpio xz-utils zip file curl ca-certificates \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Cache Android clang r416183b
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ~/toolchains/clang
          key: android-clang-r416183b-linux-x86-v2

      - name: Install Android clang r416183b
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail

          mkdir -p "${HOME}/toolchains/clang"

          CLANG_ARCHIVE="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-release/clang-r416183b.tar.gz"

          if curl -fL "${CLANG_ARCHIVE}" -o /tmp/clang-r416183b.tar.gz; then
            tar -xzf /tmp/clang-r416183b.tar.gz -C "${HOME}/toolchains/clang"
          else
            echo "Archive download failed, falling back to AOSP clone"
            git clone --depth=1 -b android12-release \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              /tmp/aosp-clang

            CLANG_DIR="$(find /tmp/aosp-clang -maxdepth 1 -type d -name 'clang-r416183*' | head -n 1)"
            test -n "${CLANG_DIR}"

            rsync -a "${CLANG_DIR}/" "${HOME}/toolchains/clang/"
          fi

          "${HOME}/toolchains/clang/bin/clang" --version

      - name: Verify stock extraction
        run: |
          set -euxo pipefail

          test -f "${STOCK_EXTRACT_DIR}/kernel_config.txt"
          test -f "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko"

          echo "=== Stock wlan module ==="
          file "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko"
          strings "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko" | grep '^vermagic='

          echo "=== Stock should not contain radiotap monitor strings ==="
          strings "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko" \
            | grep -iE 'radiotap|wlanMon|CFG_SUPPORT_SNIFFER_RADIOTAP|NL80211_IFTYPE_MONITOR' || true

          echo "=== Require cfg80211.ko / mac80211.ko (needed for real CRCs of ==="
          echo "=== cfg80211_cac_event / cfg80211_radar_event / cfg80211_cqm_*_notify / ==="
          echo "=== ieee80211_freq_khz_to_channel, which the radiotap-enabled build needs ==="
          echo "=== but the stock wlan_drv_gen4m.ko never imported) ==="
          test -f "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/cfg80211.ko" || {
            echo "ERROR: cfg80211.ko missing from ${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/"
            echo "ERROR: pull it from the device first, see README-FULL-PROCESS.md step 0."
            exit 1
          }
          test -f "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/mac80211.ko" || {
            echo "ERROR: mac80211.ko missing from ${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/"
            echo "ERROR: pull it from the device first, see README-FULL-PROCESS.md step 0."
            exit 1
          }
          file "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/cfg80211.ko"
          file "${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/mac80211.ko"

      - name: Clone Xiaomi kernel and MTK modules
        run: |
          set -euxo pipefail

          rm -rf "${BUILD_DIR}"
          mkdir -p "${BUILD_DIR}"

          git clone --depth=1 --branch "${KERNEL_BRANCH}" \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            "${BUILD_DIR}/kernel_spark"

          git clone --depth=1 --branch "${KERNEL_BRANCH}" \
            https://github.com/MiCode/MTK_kernel_modules.git \
            "${BUILD_DIR}/vendor/mediatek/kernel_modules"

          cd "${BUILD_DIR}/vendor/mediatek/kernel_modules/connectivity/wlan/core"
          ln -sfn gen4-mt79xx gen4m

      - name: Patch wlan source for Redmi spark radiotap build
        run: |
          set -euxo pipefail

          WLAN="${BUILD_DIR}/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx"
          cd "${WLAN}"

          echo "=== Force radiotap monitor support ==="
          python3 - <<'PY'
          from pathlib import Path

          p = Path("Makefile")
          s = p.read_text()

          old = """ifeq ($(CONFIG_SUPPORT_SNIFFER_RADIOTAP), y)
              ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1
              ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=1
          else
              ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=0
              ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=0
          endif"""

          new = """# Redmi Pad SE 8.7 4G spark monitor-mode build
          ccflags-y += -DCFG_SUPPORT_SNIFFER_RADIOTAP=1
          ccflags-y += -DCFG_SUPPORT_PDMA_SCATTER=0"""

          if old in s:
              s = s.replace(old, new)
          else:
              s += "\n" + new + "\n"

          p.write_text(s)
          PY

          echo "=== Keep GKI support enabled, but disable separate reset KO path ==="
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("Makefile")
          s = p.read_text()

          # Do not allow command-line CONFIG_GKI_SUPPORT=n to activate filp_open/kernel_read paths.
          s = re.sub(r"^CONFIG_GKI_SUPPORT\s*=.*$", "CONFIG_GKI_SUPPORT=y", s, flags=re.M)

          # We still want CFG_ENABLE_GKI_SUPPORT=1, but we do NOT want CFG_CHIP_RESET_KO_SUPPORT.
          # On AXI builds MODULE_NAME_RESET is empty, causing reset symbol/module problems.
          s = s.replace("ccflags-y += -DCFG_CHIP_RESET_KO_SUPPORT",
                        "# Redmi spark: disabled external reset KO support for AXI build")

          s = s.replace("RESET_OBJS := reset/reset.o",
                        "# Redmi spark: RESET_OBJS disabled for AXI")
          s = s.replace("$(MODULE_NAME_RESET)-objs += $(RESET_OBJS)",
                        "# Redmi spark: MODULE_NAME_RESET objs disabled for AXI")
          s = s.replace("obj-m += $(MODULE_NAME_RESET).o",
                        "# Redmi spark: MODULE_NAME_RESET obj-m disabled for AXI")

          p.write_text(s)
          PY

          echo "=== Enable Android wlan_assistant NVRAM & dedicated log path ==="
          echo "=== (In MediaTek's open-source release tree, CFG_WLAN_ASSISTANT_NVRAM is 0"
          echo "===  and CONFIG_MTK_CONNSYS_DEDICATED_LOG_PATH is undefined in config.h."
          echo "===  When those are off, the driver never registers wlanNvramBufHandler"
          echo "===  or consys_log_event_notification with wmt_cdev_wifi / fw_log_wifi."
          echo "===  When Android's wlan_assistant opens /dev/wmtWifi on boot and calls"
          echo "===  WIFI_write WR-BUF:NVRAM or fw_log ioctl, the character device hits NULL"
          echo "===  handlers and deadlocks in a 200-second loop: 'Wi-Fi driver is not ready for 2s')"
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("include/config.h")
          if p.exists():
              s = p.read_text()
              # 1) NVRAM & fwlog (deadlock fixes from v10)
              s = re.sub(r"#undef\s+CONFIG_MTK_CONNSYS_DEDICATED_LOG_PATH",
                         "#define CONFIG_MTK_CONNSYS_DEDICATED_LOG_PATH 1", s)
              s = re.sub(r"#define\s+CFG_WLAN_ASSISTANT_NVRAM\s+0",
                         "#define CFG_WLAN_ASSISTANT_NVRAM 1", s)
              # 2) Force radiotap on (config.h overrides Makefile -D, so must patch here)
              s = re.sub(r"#undef\s+CFG_SUPPORT_SNIFFER_RADIOTAP",
                         "#define CFG_SUPPORT_SNIFFER_RADIOTAP 1", s)
              s = re.sub(r"#define\s+CFG_SUPPORT_SNIFFER_RADIOTAP\s+0",
                         "#define CFG_SUPPORT_SNIFFER_RADIOTAP 1", s)
              # 3) Disable persistent netdev so prGlueInfo exists before NVRAM handler
              s = re.sub(r"#define\s+CFG_SUPPORT_PERSIST_NETDEV\s+1",
                         "#define CFG_SUPPORT_PERSIST_NETDEV 0", s)
              if "CFG_SUPPORT_PERSIST_NETDEV" not in s:
                  s += "\n#define CFG_SUPPORT_PERSIST_NETDEV 0\n"
              else:
                  s = re.sub(r"#undef\s+CFG_SUPPORT_PERSIST_NETDEV",
                             "#define CFG_SUPPORT_PERSIST_NETDEV 0", s)
              p.write_text(s)
              print("Patched include/config.h for radiotap=1, NVRAM=1, log_path=1, persist_netdev=0")

          p_init = Path("os/linux/gl_init.c")
          if p_init.exists():
              s_init = p_init.read_text()
              if "consys_get_fw_ver_cb" in s_init:
                  print("consys_get_fw_ver_cb already present; skipping")
              else:
                  old_reg = "wifi_fwlog_event_func_register(consys_log_event_notification);"
                  new_reg = "wifi_fwlog_event_func_register(consys_log_event_notification);\n\twifi_fwlog_get_fw_ver_register((void *)consys_get_fw_ver_cb);"
                  if old_reg not in s_init:
                      raise SystemExit("Could not find wifi_fwlog_event_func_register call site")
                  s_init = s_init.replace(old_reg, new_reg, 1)
                  # Inject callback at the VERY TOP of the file, unconditionally.
                  # It uses only standard C types so no #include is needed.
                  dummy_cb = (
                      "/* Redmi spark v11.3: dummy fwlog version callback (top of file, unconditional) */\n"
                      "extern void wifi_fwlog_get_fw_ver_register(void *);\n"
                      "static void consys_get_fw_ver_cb(unsigned char *name, unsigned int *len, unsigned int max_len)\n"
                      "{\n"
                      "    if (len) *len = 0;\n"
                      "}\n\n"
                  )
                  s_init = dummy_cb + s_init
                  p_init.write_text(s_init)
                  print("Patched os/linux/gl_init.c with unconditional consys_get_fw_ver_cb")
          PY

          echo "=== Fix empty reset module Kbuild issue defensively ==="
          sed -i \
            -e 's/\$(MODULE_NAME_RESET)-objs += \$(RESET_OBJS)/ifneq (\$(MODULE_NAME_RESET),)\n\$(MODULE_NAME_RESET)-objs += \$(RESET_OBJS)/' \
            -e 's/obj-m += \$(MODULE_NAME_RESET)\.o/obj-m += \$(MODULE_NAME_RESET).o\nendif/' \
            Makefile || true

          echo "=== Disable Werror and add Clang-safe warning suppressions ==="
          sed -i 's/-Werror/-Wno-error/g' Makefile

          cat >> Makefile <<'EOF'

          # Redmi spark CI warning suppressions
          ccflags-y += -Wno-error
          ccflags-y += -Wno-unknown-warning-option
          ccflags-y += -Wno-implicit-function-declaration
          ccflags-y += -Wno-incompatible-pointer-types
          ccflags-y += -Wno-int-conversion
          ccflags-y += -Wno-unused-function
          ccflags-y += -Wno-unused-variable
          ccflags-y += -Wno-unused-but-set-variable
          ccflags-y += -Wno-misleading-indentation
          ccflags-y += -Wno-address-of-packed-member
          ccflags-y += -Wno-format
          ccflags-y += -Wno-missing-prototypes
          ccflags-y += -Wno-pointer-sign
          EOF

          echo "=== Patch halIsHifStateReady for AXI ==="
          python3 - <<'PY'
          import re
          from pathlib import Path

          p = Path("os/linux/hif/common/hal_pdma.c")
          s = p.read_text()

          pattern = r"bool\s+halIsHifStateReady\s*\(.*?\)\s*\{.*?\n\}"

          replacement = """bool halIsHifStateReady(IN struct ADAPTER *prAdapter, uint8_t *pucState)
          {
          \tif (!prAdapter || !prAdapter->prGlueInfo || prAdapter->prGlueInfo->u4ReadyFlag == 0)
          \t\treturn FALSE;

          #if defined(_HIF_PCIE)
          \tif (pucState)
          \t\t*pucState = prAdapter->prGlueInfo->rHifInfo.eSuspendtate;

          \tif (prAdapter->prGlueInfo->rHifInfo.eSuspendtate == PCIE_STATE_SUSPEND_ENTERING)
          \t\treturn FALSE;
          #else
          \tif (pucState)
          \t\t*pucState = 0;
          #endif

          \treturn TRUE;
          }"""

          ns = re.sub(pattern, replacement, s, count=1, flags=re.S)
          if ns != s:
              p.write_text(ns)
              print("patched halIsHifStateReady")
          else:
              print("halIsHifStateReady pattern not found or already patched")
          PY

          echo "=== Patch AXI legacy timer API ==="
          python3 - <<'PY'
          import re
          from pathlib import Path

          p = Path("os/linux/hif/axi/axi.c")
          s = p.read_text()

          pattern = (
              r"init_timer\(&prHif->rSerTimer\);\s*"
              r"prHif->rSerTimer\.function\s*=\s*halHwRecoveryTimeout;\s*"
              r"prHif->rSerTimer\.data\s*=\s*\(unsigned long\)prGlueInfo;\s*"
              r"prHif->rSerTimer\.expires\s*=\s*jiffies\s*\+\s*HIF_SER_TIMEOUT\s*\*\s*HZ\s*/\s*MSEC_PER_SEC;"
          )

          replacement = """#if KERNEL_VERSION(4, 15, 0) <= LINUX_VERSION_CODE
          \ttimer_setup(&prHif->rSerTimer, halHwRecoveryTimeout, 0);
          #else
          \tinit_timer(&prHif->rSerTimer);
          \tprHif->rSerTimer.function = halHwRecoveryTimeout;
          \tprHif->rSerTimer.data = (unsigned long)prGlueInfo;
          \tprHif->rSerTimer.expires =
          \t\tjiffies + HIF_SER_TIMEOUT * HZ / MSEC_PER_SEC;
          #endif"""

          ns = re.sub(pattern, replacement, s, count=1, flags=re.S)
          if ns != s:
              p.write_text(ns)
              print("patched AXI timer API")
          else:
              print("AXI timer pattern not found or already patched")
          PY

          echo "=== Remove moved debug hooks from chip structs ==="
          find chips/ -type f -name "*.c" -exec \
            sed -i '/\.show_mcu_debug_info\s*=\s*NULL/d; /\.show_conninfra_debug_info\s*=\s*NULL/d' {} +

          # v15 D2': RESTORE the v11.3 wake-lock header patch.
          # v14 removed this patch believing wake-lock was speculative,
          # then injected placeholder CRCs (0xdeadbeef) for
          # wakeup_source_add/remove into Module.symvers to compensate.
          # On device, the kernel rejected the module because
          # 0xdeadbeef didn't match the real vmlinux CRC:
          #   [15.119009] wlan_drv_gen4m: disagrees about version of symbol wakeup_source_add
          #   [15.119033] wlan_drv_gen4m: Unknown symbol wakeup_source_add (err -22)
          #   [15.127214] init: ... finit_module ... failed: Invalid argument
          # So Wi-Fi never came up (116x "not ready for 2s" spam
          # from wlan_assistant), and the tablet was un-Wi-Fi'd until
          # rollback.
          #
          # The v11.3 patch below forces the pre-5.1 branch of the
          # wake-lock macros, so the module imports
          # wakeup_source_REGISTER / _UNREGISTER, which stock
          # wlan_drv_gen4m.ko ALSO imports -> real CRCs are already in
          # our stock-derived Module.symvers, no placeholders needed.
          echo "=== v15 D2': force wake-lock macros onto register/unregister ==="
          python3 - <<'PY'
          from pathlib import Path
          p = Path("os/linux/include/gl_kal.h")
          s = p.read_text()
          old = "#if (KERNEL_VERSION(5, 1, 0) <= LINUX_VERSION_CODE)"
          new = (
              "/* Redmi spark v15: forced off. wakeup_source_add/remove\n"
              " * (the >=5.1 API path) have no CRC in our stock-derived\n"
              " * Module.symvers because no stock .ko imports them.\n"
              " * v14 tried a placeholder 0xdeadbeef CRC and the kernel\n"
              " * rejected the module at insmod time with\n"
              " * 'disagrees about version of symbol wakeup_source_add'.\n"
              " * Fall through to the register/unregister API instead:\n"
              " * stock wlan_drv_gen4m.ko imports THOSE symbols, so real\n"
              " * CRCs exist for them and modversions verification passes.\n"
              " */\n"
              "#if 0 && (KERNEL_VERSION(5, 1, 0) <= LINUX_VERSION_CODE)"
          )
          n = s.count(old)
          if n != 1:
              raise SystemExit(
                  f"ERROR: expected 1 occurrence of wake-lock version gate, found {n}")
          s = s.replace(old, new, 1)
          p.write_text(s)
          print("patched wake-lock macros -> register/unregister branch")
          PY

          echo "=== Verify wake-lock patch applied ==="
          grep -n "Redmi spark v15: forced off" os/linux/include/gl_kal.h

          echo "=== Verify gl_init.c callback injected ==="
          grep -n "consys_get_fw_ver_cb" os/linux/gl_init.c | head -5

          echo "=== Verify config.h key defines ==="
          grep -n "CFG_SUPPORT_SNIFFER_RADIOTAP" include/config.h | head -3
          grep -n "CFG_SUPPORT_PERSIST_NETDEV" include/config.h | head -2
          grep -n "CFG_WLAN_ASSISTANT_NVRAM" include/config.h | head -2
          grep -n "CONFIG_MTK_CONNSYS_DEDICATED_LOG_PATH" include/config.h | head -2

          echo "=== Avoid vmlinux-only symbols with no CRC anywhere in our stock ==="
          echo "=== extraction: napi_complete_done, skb_queue_purge, sched_set_fifo_low. ==="
          echo "=== These are exported by net/core/dev.c, net/core/skbuff.c, and ==="
          echo "=== kernel/sched/core.c directly (not any loadable .ko), so there is no ==="
          echo "=== stock module we can scrape a real CRC from, and building vmlinux to ==="
          echo "=== get one is what caused the earlier 'LTO vmlinux.o' CI timeout. Stock's ==="
          echo "=== own build never needed these symbols (verified: none of them appear ==="
          echo "=== anywhere in the stock wlan_drv_gen4m.ko), so we take the same code ==="
          echo "=== paths stock takes instead of forcing new vmlinux dependencies."
          python3 - <<'PY'
          import re
          from pathlib import Path

          # 1) napi_complete_done: kal_napi_complete_done() calls it directly on
          #    kernel >= 3.19 (our kernel is 5.10.198), and napi_complete() on
          #    older kernels is *also* just a static-inline wrapper around
          #    napi_complete_done() in <linux/netdevice.h> -- so there is no
          #    version-gate escape here, only avoiding the whole NAPI-poll path
          #    works. Stock's own build takes CFG_SUPPORT_RX_GRO's "direct GRO"
          #    path (kal_gro_flush(), no napi_complete_done at all) -- confirmed
          #    by the stock .ko containing zero occurrences of kalNapiInit /
          #    kalNapiPoll / kal_napi_complete_done. CFG_SUPPORT_RX_NAPI already
          #    defaults to 0 and we never set CONFIG_SUPPORT_RX_NAPI=y, so the
          #    actual difference is CFG_SUPPORT_RX_GRO itself: force it to 0 to
          #    match stock's compiled code path exactly.
          p = Path("include/config.h")
          s = p.read_text()

          old_pattern = r"#define\s+CFG_SUPPORT_RX_GRO\s+1"
          if re.search(old_pattern, s):
              new = (
                  "/* Redmi spark: forced off. napi_complete_done has zero CRC coverage\n"
                  " * anywhere in our stock module extraction (it is a vmlinux-only\n"
                  " * export, net/core/dev.c) and napi_complete() on this kernel is just\n"
                  " * a static-inline wrapper around napi_complete_done() -- so no\n"
                  " * kernel-version gate can avoid it once this path is compiled in.\n"
                  " * The stock module's own build never enables this path (confirmed:\n"
                  " * stock .ko contains zero kalNapiInit/kalNapiPoll/kal_napi_complete_done\n"
                  " * symbols), so we match stock instead of requiring a full vmlinux\n"
                  " * build just to get one extra CRC.\n"
                  " */\n"
                  "#define CFG_SUPPORT_RX_GRO                      0"
              )
              s = re.sub(old_pattern, new, s, count=1)
              p.write_text(s)
              print("patched CFG_SUPPORT_RX_GRO=0 (matches stock's compiled RX path)")
          else:
              print("WARNING: CFG_SUPPORT_RX_GRO 1 not found; may already be 0 or undefined. Skipping.")
          PY

          python3 - <<'PY'
          import re
          from pathlib import Path

          # 2) skb_queue_purge: only reachable via CFG_ASSERT_DUMP's firmware-dump
          #    debug skb queue (wlanNetCreate/wlanNetDestroy). Stock's own build
          #    never calls it either (confirmed: stock .ko has zero occurrences),
          #    even though CFG_ASSERT_DUMP is unconditionally 1 in config.h --
          #    the two callsites are trivially skippable without touching the
          #    surrounding waitqueue/skb_queue_head_init init logic, which stock
          #    clearly keeps (rFwDumpSkbQueue is still declared/initialized).
          #    We only drop the purge-on-destroy call itself, which just leaks
          #    at most a few queued debug skbs, if any, during device teardown --
          #    a Magisk-module-overlay wlan_drv_gen4m.ko is never actually
          #    rmmod'd in normal operation, so this path is not exercised anyway.
          p = Path("os/linux/gl_init.c")
          s = p.read_text()

          old = "\tskb_queue_purge(&(prGlueInfo->rFwDumpSkbQueue));"
          if old in s:
              new = (
                  "\t/* Redmi spark: skb_queue_purge has zero CRC coverage anywhere in\n"
                  "\t * our stock module extraction (vmlinux-only export,\n"
                  "\t * net/core/skbuff.c). Stock's own build never calls it either\n"
                  "\t * (confirmed: zero occurrences in stock wlan_drv_gen4m.ko), so we\n"
                  "\t * skip it here too instead of requiring a full vmlinux build for\n"
                  "\t * one extra CRC. This only affects module teardown, which never\n"
                  "\t * happens for a Magisk overlay module in normal operation.\n"
                  "\t */"
              )
              s = s.replace(old, new, 1)
              p.write_text(s)
              print("patched out skb_queue_purge call (matches stock's compiled behavior)")
          else:
              print("WARNING: skb_queue_purge callsite not found; may already be patched. Skipping.")
          PY

          python3 - <<'PY'
          import re
          from pathlib import Path

          # 3) sched_set_fifo_low: only reached via kal_sched_set()'s "else"
          #    branch on kernel >= 5.9 when policy != SCHED_NORMAL/SCHED_FIFO.
          #    Stock's own build never calls kal_sched_set/kalSetThreadSchPolicyPriority
          #    at all (confirmed: zero occurrences in stock .ko) -- it uses
          #    sched_setattr() directly elsewhere, which *does* have a valid CRC
          #    in stock's own wlan_drv_gen4m.ko. Route this fallback branch
          #    through sched_setattr() too (SCHED_FIFO with the same "low"
          #    priority=1 the kernel's own sched_set_fifo_low() would have used)
          #    instead of calling the uncovered symbol directly.
          p = Path("os/linux/gl_kal.c")
          s = p.read_text()

          old = "\telse\n\t\tsched_set_fifo_low(p);"
          if old in s:
              new = (
                  "\telse {\n"
                  "\t\t/* Redmi spark: sched_set_fifo_low has zero CRC coverage anywhere\n"
                  "\t\t * in our stock module extraction (vmlinux-only export,\n"
                  "\t\t * kernel/sched/core.c). Stock's own build never calls\n"
                  "\t\t * kal_sched_set() at all (confirmed: zero occurrences in stock\n"
                  "\t\t * .ko) and uses sched_setattr() directly instead, which does\n"
                  "\t\t * have a valid CRC in stock's own wlan_drv_gen4m.ko. Reproduce\n"
                  "\t\t * sched_set_fifo_low()'s exact behavior (SCHED_FIFO, priority 1)\n"
                  "\t\t * through that already-covered symbol instead.\n"
                  "\t\t */\n"
                  "\t\tstruct sched_attr redmi_spark_low_attr = {\n"
                  "\t\t\t.sched_policy = SCHED_FIFO,\n"
                  "\t\t\t.sched_priority = 1,\n"
                  "\t\t};\n"
                  "\t\tsched_setattr(p, &redmi_spark_low_attr);\n"
                  "\t}"
              )
              s = s.replace(old, new, 1)
              p.write_text(s)
              print("patched sched_set_fifo_low callsite to use sched_setattr (matches stock's own symbol usage)")
          else:
              print("WARNING: sched_set_fifo_low callsite not found; may already be patched. Skipping.")
          PY

          echo "=== Verify all three avoidance patches applied ==="
          grep -n "Redmi spark: forced off. napi_complete_done" include/config.h
          grep -n "Redmi spark: skb_queue_purge has zero CRC" os/linux/gl_init.c
          grep -n "Redmi spark: sched_set_fifo_low has zero CRC" os/linux/gl_kal.c

      - name: v15 D1 - Disable Clang-CFI for the wlan module
        run: |
          set -euxo pipefail
          WLAN="${BUILD_DIR}/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx"
          cd "${WLAN}"

          echo "=== v15 D1: append -fno-sanitize=cfi to ccflags-y ==="
          # BACKGROUND -- WHY THIS EXISTS AT ALL:
          # v12 shipped a working, radiotap-enabled .ko that loaded fine at boot
          # but 38 s later firmware asserted (pstore-console:
          #   assert@../patch/sys_patch_mcu.c_2780
          #   WIFI trigger assert
          # ) and wmt_drv called our wlan reset-message callback through a
          # function pointer whose Clang-CFI type ID (computed by our out-of-tree
          # build) did not match what the stock kernel expected. Kernel raised
          # BRK #0x5502 and panicked:
          #   pc : __cfi_check_fail+0x20/0x24 [wlan_drv_gen4m]
          #   Call trace: __cfi_check_fail <- wmt_cdev_rstmsg_snd
          #               <- wmt_lib_cmb_rst <- wmt_lib_btm_cb
          # Disabling CFI for our out-of-tree module removes all such type-ID
          # mismatch panics regardless of which callback is later registered
          # with wmt_drv / connadp / cfg80211 / etc.
          #
          # v14 FIX vs v13:
          # v13 also added `-fno-sanitize=kcfi` and `ldflags-y += -fno-sanitize=cfi`
          # as belt-and-braces. But this workflow's toolchain is Android
          # clang-r416183b (Clang 12), which does NOT know the `kcfi` sanitizer
          # (added in Clang 16), so it errors out:
          #   clang-12: error: unsupported argument 'kcfi' to option 'fno-sanitize='
          # v13's build died after ~4 files. Also, the module build system does
          # not honour `ldflags-y` the same way as `ccflags-y` for CFI runtime
          # symbols anyway. The single line below is sufficient and Clang-12-safe.
          cat >> Makefile <<'EOF'

          # Redmi spark v14: disable Clang-CFI globally for this module.
          ccflags-y += -fno-sanitize=cfi
          EOF

          echo "=== confirm the flags are in the Makefile ==="
          tail -20 Makefile
          grep -n 'fno-sanitize' Makefile

      - name: Apply hard ABI fixes for symbols that failed on device
