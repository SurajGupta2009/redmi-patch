      - name: Generate stock-derived Module.symvers
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          import os
          import re
          import struct
          import subprocess
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          build_dir = Path(os.environ["BUILD_DIR"])
          stock_dir = workspace / os.environ["STOCK_EXTRACT_DIR"] / "modules_vendor_lib_modules"
          wlan_src = build_dir / "vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4-mt79xx"

          out_path = build_dir / "stock-crc" / "Module.symvers"
          kernel_out_path = build_dir / "kernel_spark" / "out" / "Module.symvers"

          def read_versions_section(ko: Path) -> bytes:
              try:
                  text = subprocess.check_output(
                      ["readelf", "-x", "__versions", str(ko)],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return b""

              data = bytearray()
              for line in text.splitlines():
                  m = re.match(r"\s*0x[0-9a-fA-F]+\s+((?:[0-9a-fA-F]{8}\s*){1,4})", line)
                  if not m:
                      continue
                  for word in m.group(1).split():
                      data.extend(bytes.fromhex(word))
              return bytes(data)

          def parse_modversions(ko: Path):
              """Parse CRCs for symbols this module IMPORTS (its __versions
              section, i.e. what it needs from other modules/vmlinux)."""
              data = read_versions_section(ko)
              result = {}

              # arm64 modversion_info is 64 bytes:
              # unsigned long crc; char name[56]
              for off in range(0, len(data) - 64 + 1, 64):
                  rec = data[off:off + 64]
                  crc = struct.unpack("<I", rec[:4])[0]
                  raw = rec[8:].split(b"\0", 1)[0]

                  if not raw or crc == 0:
                      continue

                  try:
                      name = raw.decode("ascii")
                  except UnicodeDecodeError:
                      continue

                  if re.match(r"^[A-Za-z0-9_\.]+$", name):
                      result[name] = crc

              return result

          def parse_own_kcrctab(ko: Path):
              """Parse CRCs for symbols this module itself EXPORTS.

              FIX (round 2): the previous version of this scraper only ever
              read each stock .ko's __versions section (what it imports),
              never what it exports. That meant a real, correct, on-device
              CRC like __crc_mtk_wcn_wmt_assert_timeout=0xa68d984a sitting
              right inside wmt_drv.ko's own symbol table was never picked up,
              because no *other* stock module happens to import that symbol.
              Reading each module's own __crc_<name> ABS symbols closes that
              gap and recovers real CRCs for mtk_wcn_wmt_assert_timeout,
              gConEmiPhyBase, and gConEmiSize (see also the self-export-filter
              fix below, which was wrongly discarding the latter two).
              """
              try:
                  text = subprocess.check_output(
                      ["readelf", "-sW", str(ko)],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return {}

              result = {}
              for line in text.splitlines():
                  parts = line.split()
                  if len(parts) < 8:
                      continue
                  ndx, name = parts[-2], parts[-1]
                  if ndx == "ABS" and name.startswith("__crc_"):
                      try:
                          crc = int(parts[1], 16) & 0xFFFFFFFF
                      except ValueError:
                          continue
                      if crc != 0:
                          result[name[len("__crc_"):]] = crc
              return result

          def find_self_exports():
              """Find symbols the patched wlan source itself EXPORT_SYMBOL()s,
              so we never let a self-export's own CRC leak into the CRC
              database we build the module against (that caused an earlier
              modpost failure via a self-exported Get_Camera_Temperature).

              FIX (round 2): skip EXPORT_SYMBOL calls that live entirely
              inside a "#if defined(UT_TEST_MODE) && defined(CFG_BUILD_X86_PLATFORM)"
              guard. That combination is unconditionally undefined on our
              real Android/arm64 CONNAC build (gen4-mt79xx/Makefile does
              "WLAN_CHIP_LIST := ... -UUT_TEST_MODE" and our
              MTK_COMBO_CHIP=CONNAC never re-adds it), so it is dead code
              that never actually compiles -- but the previous filter matched
              it as plain text regardless of surrounding #if guards, and
              wrongly stripped the real, valid, already-scraped CRCs for
              gConEmiPhyBase/gConEmiSize (which stock actually gets from
              wmt_drv.ko, not from this dead code) right back out again.
              """
              exports = set()
              rex = re.compile(r"\bEXPORT_SYMBOL(?:_GPL)?(?:_NS)?\s*\(\s*([A-Za-z_][A-Za-z0-9_]*)", re.S)
              dead_guard = re.compile(
                  r"#if\s+defined\(UT_TEST_MODE\)\s*&&\s*defined\(CFG_BUILD_X86_PLATFORM\)"
                  r".*?#endif",
                  re.S,
              )

              for p in wlan_src.rglob("*"):
                  if p.suffix not in [".c", ".h"]:
                      continue
                  try:
                      text = p.read_text(errors="ignore")
                  except Exception:
                      continue
                  # Strip dead UT_TEST_MODE/X86-only blocks before searching,
                  # so EXPORT_SYMBOL calls that only exist in code that never
                  # compiles for our build are not falsely flagged.
                  stripped = dead_guard.sub("", text)
                  for m in rex.finditer(stripped):
                      exports.add(m.group(1))

              # Explicit self-export seen in an earlier modpost failure.
              # This one is real (not inside any dead #if guard), keep it.
              exports.add("Get_Camera_Temperature")
              return exports

          stock_wlan = stock_dir / "wlan_drv_gen4m.ko"
          if not stock_wlan.exists():
              raise SystemExit(f"Missing stock wlan module: {stock_wlan}")

          versions = parse_modversions(stock_wlan)

          # Fill extra CRCs from what all other stock modules IMPORT.
          for ko in sorted(stock_dir.glob("*.ko")):
              for name, crc in parse_modversions(ko).items():
                  versions.setdefault(name, crc)

          # FIX (round 2): also fill CRCs from what each stock module itself
          # EXPORTS. This is what recovers mtk_wcn_wmt_assert_timeout,
          # gConEmiPhyBase, and gConEmiSize from wmt_drv.ko's own symbol
          # table, none of which any *other* stock module happens to import.
          recovered_from_own_exports = {}
          for ko in sorted(stock_dir.glob("*.ko")):
              for name, crc in parse_own_kcrctab(ko).items():
                  if name not in versions:
                      recovered_from_own_exports[name] = (ko.name, crc)
                  versions.setdefault(name, crc)

          if "module_layout" not in versions:
              raise SystemExit("module_layout CRC not found")

          self_exports = find_self_exports()
          removed = {}
          for name in sorted(self_exports):
              if name in versions:
                  removed[name] = versions.pop(name)

          out_path.parent.mkdir(parents=True, exist_ok=True)
          kernel_out_path.parent.mkdir(parents=True, exist_ok=True)

          lines = []
          for name in sorted(versions):
              lines.append(f"0x{versions[name]:08x}\t{name}\tvmlinux\tEXPORT_SYMBOL\t\n")

          out_path.write_text("".join(lines))
          kernel_out_path.write_text("".join(lines))

          print(f"Wrote {len(versions)} CRCs")
          print(f"module_layout=0x{versions['module_layout']:08x}")
          print()
          print(f"Recovered {len(recovered_from_own_exports)} CRCs from stock modules' own export tables:")
          for name, (ko_name, crc) in sorted(recovered_from_own_exports.items()):
              print(f"  0x{crc:08x} {name} (exported by {ko_name})")
          print()
          print(f"Removed {len(removed)} self-export CRCs")
          for name, crc in list(sorted(removed.items()))[:50]:
              print(f"removed self export: 0x{crc:08x} {name}")

          # Sanity check: the two bugs fixed in this revision should now be
          # resolved. Fail loudly and early if they somehow are not, rather
          # than finding out from a modpost warning again.
          expected_recovered = ["gConEmiPhyBase", "gConEmiSize", "mtk_wcn_wmt_assert_timeout"]
          still_missing = [s for s in expected_recovered if s not in versions]
          if still_missing:
              raise SystemExit(
                  "ERROR: expected these symbols to be recoverable from stock "
                  f"modules' own export tables, but they are still missing: {still_missing}")
          PY

          test -s "${BUILD_DIR}/stock-crc/Module.symvers"
          test -s "${BUILD_DIR}/kernel_spark/out/Module.symvers"

          echo "=== Module.symvers sample ==="
          head -40 "${BUILD_DIR}/kernel_spark/out/Module.symvers"

          if grep -q 'Get_Camera_Temperature' "${BUILD_DIR}/kernel_spark/out/Module.symvers"; then
            echo "ERROR: self-export leaked into Module.symvers"
            exit 1
          fi

          echo "=== Merge in cfg80211.ko / mac80211.ko CRCs (imports + own exports) ==="
          echo "=== These cover cfg80211_cac_event, cfg80211_radar_event, ==="
          echo "=== cfg80211_cqm_rssi_notify, cfg80211_cqm_txe_notify, and ==="
          echo "=== ieee80211_freq_khz_to_channel, which the radiotap-enabled build ==="
          echo "=== needs but the stock wlan_drv_gen4m.ko never imported, so no ==="
          echo "=== other stock .ko has their CRCs -- only cfg80211.ko/mac80211.ko ==="
          echo "=== themselves (pulled from the device, see README) do."
          python3 - <<'PY'
          import os
          import re
          import struct
          import subprocess
          from pathlib import Path

          build_dir = Path(os.environ["BUILD_DIR"])
          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          stock_dir = workspace / os.environ["STOCK_EXTRACT_DIR"] / "modules_vendor_lib_modules"
          symvers_path = build_dir / "kernel_spark" / "out" / "Module.symvers"
          stock_symvers_path = build_dir / "stock-crc" / "Module.symvers"

          def read_versions_section(ko):
              try:
                  text = subprocess.check_output(
                      ["readelf", "-x", "__versions", str(ko)],
                      text=True, stderr=subprocess.DEVNULL)
              except subprocess.CalledProcessError:
                  return b""
              data = bytearray()
              for line in text.splitlines():
                  m = re.match(r"\s*0x[0-9a-fA-F]+\s+((?:[0-9a-fA-F]{8}\s*){1,4})", line)
                  if not m:
                      continue
                  for word in m.group(1).split():
                      data.extend(bytes.fromhex(word))
              return bytes(data)

          def parse_modversions(ko):
              data = read_versions_section(ko)
              result = {}
              for off in range(0, len(data) - 64 + 1, 64):
                  rec = data[off:off + 64]
                  crc = struct.unpack("<I", rec[:4])[0]
                  raw = rec[8:].split(b"\x00", 1)[0]
                  if not raw or crc == 0:
                      continue
                  try:
                      name = raw.decode("ascii")
                  except UnicodeDecodeError:
                      continue
                  if re.match(r"^[A-Za-z0-9_.]+$", name):
                      result[name] = crc
              return result

          def parse_own_kcrctab(ko):
              try:
                  text = subprocess.check_output(
                      ["readelf", "-sW", str(ko)],
                      text=True, stderr=subprocess.DEVNULL)
              except subprocess.CalledProcessError:
                  return {}
              result = {}
              for line in text.splitlines():
                  parts = line.split()
                  if len(parts) < 8:
                      continue
                  ndx, name = parts[-2], parts[-1]
                  if ndx == "ABS" and name.startswith("__crc_"):
                      try:
                          crc = int(parts[1], 16) & 0xFFFFFFFF
                      except ValueError:
                          continue
                      if crc != 0:
                          result[name[len("__crc_"):]] = crc
              return result

          existing_lines = symvers_path.read_text().splitlines()
          existing_names = set()
          for line in existing_lines:
              parts = line.split("\t")
              if len(parts) >= 2:
                  existing_names.add(parts[1])

          added = {}
          for ko_name in ["cfg80211.ko", "mac80211.ko"]:
              ko = stock_dir / ko_name
              if not ko.exists():
                  raise SystemExit(f"ERROR: {ko} not found (should have been checked earlier)")
              merged = {}
              merged.update(parse_modversions(ko))
              merged.update(parse_own_kcrctab(ko))
              for name, crc in merged.items():
                  if name not in existing_names:
                      added[name] = (ko_name, crc)
                      existing_names.add(name)

          new_lines = list(existing_lines)
          for name, (ko_name, crc) in sorted(added.items()):
              new_lines.append(f"0x{crc:08x}\t{name}\tvmlinux\tEXPORT_SYMBOL\t")

          text = "\n".join(new_lines) + "\n"
          symvers_path.write_text(text)
          stock_symvers_path.write_text(text)

          print(f"Added {len(added)} CRCs from cfg80211.ko/mac80211.ko:")
          for name, (ko_name, crc) in sorted(added.items()):
              print(f"  0x{crc:08x} {name} (from {ko_name})")

          expected = [
              "cfg80211_cac_event", "cfg80211_radar_event",
              "cfg80211_cqm_rssi_notify", "cfg80211_cqm_txe_notify",
              "ieee80211_freq_khz_to_channel",
          ]
          still_missing = [s for s in expected if s not in existing_names]
          if still_missing:
              raise SystemExit(
                  f"ERROR: expected these symbols from cfg80211.ko/mac80211.ko "
                  f"but they are still missing after merge: {still_missing}")
          print("OK: all expected cfg80211/mac80211 symbols now have CRC coverage.")
          PY

          echo "=== Module.symvers sample after cfg80211/mac80211 merge ==="
          tail -20 "${BUILD_DIR}/kernel_spark/out/Module.symvers"

      - name: v15 D3' - Wake-lock CRC injection REMOVED
        run: |
          set -euxo pipefail
          # v14 injected 0xdeadbeef placeholder CRCs for wakeup_source_*
          # into Module.symvers. On device the kernel rejected the module
          # with 'disagrees about version of symbol wakeup_source_add'.
          #
          # In v15 we don't inject anything: the source-level D2' patch
          # above rerouted the module through wakeup_source_register /
          # _unregister, which are already in our stock-derived
          # Module.symvers with real CRCs (stock wlan_drv_gen4m.ko
          # imports them too). So nothing to do here.
          echo "=== v15 D3': wake-lock CRC injection SKIPPED (see D2' patch above) ==="
          echo "=== confirm the correct wake-lock CRCs are already in Module.symvers ==="
          SYMVERS="${BUILD_DIR}/kernel_spark/out/Module.symvers"
          for sym in wakeup_source_register wakeup_source_unregister; do
              line=$(grep -P "\t${sym}\t" "${SYMVERS}" || true)
              if [ -z "${line}" ]; then
                  echo "ERROR: ${sym} has no CRC in stock-derived Module.symvers"
                  exit 1
              fi
              echo "  ${line}"
          done
          echo "=== and that add/remove are NOT present (would cause the same bug as v14) ==="
          for sym in wakeup_source_add wakeup_source_remove; do
              line=$(grep -P "\t${sym}\t" "${SYMVERS}" || true)
              if [ -n "${line}" ]; then
                  echo "WARNING: ${sym} is present in Module.symvers: ${line}"
                  echo "         If our source patch didn't take effect the module"
                  echo "         might try to import this and get rejected on device."
              fi
          done

      - name: Build patched wlan_drv_gen4m.ko
        run: |
          set -euxo pipefail

          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export PATH="${HOME}/toolchains/clang/bin:${PATH}"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          KERNEL_DIR="${BUILD_DIR}/kernel_spark"
          OUT_DIR="${KERNEL_DIR}/out"
          WLAN_M="${BUILD_DIR}/vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m"

          cd "${BUILD_DIR}"

          test -s "${OUT_DIR}/Module.symvers"
          grep -q 'module_layout' "${OUT_DIR}/Module.symvers"

          set +e
          make -C "${KERNEL_DIR}" \
            O="${OUT_DIR}" \
            M="${WLAN_M}" \
            MODULE_NAME=wlan_drv_gen4m \
            CONFIG_MTK_COMBO_WIFI_HIF=axi \
            MTK_COMBO_CHIP=CONNAC \
            WLAN_CHIP_ID=6765 \
            MTK_ANDROID_WMT=y \
            MTK_ANDROID_EMI=y \
            CONFIG_GKI_SUPPORT=y \
            CONFIG_SUPPORT_SNIFFER_RADIOTAP=y \
            KBUILD_MODPOST_WARN=1 \
            ARCH=arm64 \
            SUBARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            modules -j"$(nproc)" 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          echo "=== Build status: ${BUILD_STATUS} ==="

          if [ "${BUILD_STATUS}" -ne 0 ]; then
            echo "ERROR: build failed"
            tail -250 "${GITHUB_WORKSPACE}/build.log" || true
            exit "${BUILD_STATUS}"
          fi

          KO="$(find "${BUILD_DIR}" -name 'wlan_drv_gen4m.ko' -type f | head -n 1)"
          if [ -z "${KO}" ]; then
            echo "ERROR: wlan_drv_gen4m.ko was not produced"
            find "${BUILD_DIR}" -name '*.ko' -type f -print || true
            exit 1
          fi

          cp "${KO}" "${GITHUB_WORKSPACE}/wlan_drv_gen4m.unstripped.ko"
          cp "${KO}" "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"

          llvm-strip --strip-debug "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" || true

          echo "=== Built module ==="
          file "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          ls -lh "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" "${GITHUB_WORKSPACE}/wlan_drv_gen4m.unstripped.ko"

      - name: Forensic dumps of produced module (always)
        if: always()
        run: |
          set -uxo pipefail
          KO="${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          if [ ! -f "$KO" ]; then
            echo "no .ko produced; nothing to dump"
            exit 0
          fi
          readelf -a "$KO"          > "${GITHUB_WORKSPACE}/readelf-a.txt"        || true
          readelf -sW "$KO"         > "${GITHUB_WORKSPACE}/readelf-sW.txt"       || true
          readelf -x __versions "$KO" > "${GITHUB_WORKSPACE}/readelf-versions.txt" || true
          nm -D "$KO" 2>/dev/null   > "${GITHUB_WORKSPACE}/nm-D.txt"             || true
          strings "$KO"             > "${GITHUB_WORKSPACE}/strings.txt"          || true

      - name: v15 D4 - Verify patched module before packaging
        run: |
          set -euxo pipefail
          KO="${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko"
          STOCK="${GITHUB_WORKSPACE}/${STOCK_EXTRACT_DIR}/modules_vendor_lib_modules/wlan_drv_gen4m.ko"

          echo "=== Vermagic ==="
          strings "${KO}" | grep '^vermagic='
          strings "${KO}" | grep -q "vermagic=${TARGET_VERMAGIC}"

          echo "=== Stock vermagic comparison ==="
          strings "${STOCK}" | grep '^vermagic='

          echo "=== __versions section ==="
          readelf -S "${KO}" | grep -q '__versions'
          readelf -S "${KO}" | grep '__versions'

          echo "=== Radiotap / monitor evidence ==="
          strings "${KO}" | grep -iE 'radiotap|wlanMon|CFG_SUPPORT_SNIFFER_RADIOTAP|ARPHRD_IEEE80211_RADIOTAP|priv_driver_sniffer|wlanoidSetIcsSniffer' | head -120

          echo "=== HARD CHECK 1: radiotapFillRadiotap must be present ==="
          # v11.3/v12 grepped the literal string "NL80211_IFTYPE_MONITOR"
          # in the .ko as its monitor-support proof. That is a C enum
          # (defined in include/uapi/linux/nl80211.h), it is NEVER present
          # as a string in any compiled kernel module, not even stock
          # cfg80211.ko. So the check always failed and v11.3/v12 CI
          # exited 1 even though the .ko was actually radiotap-enabled.
          # v13 checks for radiotapFillRadiotap, which IS a real symbol
          # only present when CFG_SUPPORT_SNIFFER_RADIOTAP=1 compiled in.
          if ! strings "${KO}" | grep -q 'radiotapFillRadiotap'; then
            echo "ERROR: radiotap RX handler is missing from module."
            echo "ERROR: include/config.h likely overrode CFG_SUPPORT_SNIFFER_RADIOTAP back to 0."
            exit 1
          fi

          echo "=== HARD CHECK 2: at least 5 radiotap_fill_* helpers ==="
          RH=$(strings "${KO}" | grep -Ec '^radiotap_fill_[a-z_]+$' || true)
          echo "radiotap_fill_* helper count: ${RH}"
          if [ "${RH}" -lt 5 ]; then
            echo "ERROR: expected >=5 radiotap_fill_* helpers, saw ${RH}"
            exit 1
          fi

          echo "=== HARD CHECK 3: CFI must be DISABLED in this build ==="
          # v12 shipped a working module that panicked on device because
          # Clang-CFI's __cfi_check_fail fired when wmt_drv called our
          # reset-message callback through a function pointer. v14/v15
          # appends -fno-sanitize=cfi to ccflags-y. The __cfi_check
          # SYMBOL is always emitted by the module framework even when
          # CFI is off, but its BODY is an empty stub (~28 bytes) instead
          # of a real type-ID lookup table (stock: 10,884 bytes). So
          # check the SIZE, not the presence.
          CFI_SIZE=$(readelf -sW "${KO}" | awk '$8=="__cfi_check"{print $3; exit}')
          echo "__cfi_check size: ${CFI_SIZE:-<missing>}"
          if [ -z "${CFI_SIZE}" ]; then
            echo "OK: __cfi_check symbol absent entirely."
          elif [ "${CFI_SIZE}" -gt 512 ]; then
            echo "ERROR: __cfi_check body is ${CFI_SIZE} bytes, expected <512."
            echo "ERROR: -fno-sanitize=cfi appears not to have taken effect."
            echo "ERROR: v12's __cfi_check_fail panic pattern would reappear on device."
            exit 1
          else
            echo "OK: __cfi_check body is a ${CFI_SIZE}-byte stub -> CFI is off."
          fi

          echo "=== HARD CHECK 4: wake-lock imports use the register/unregister API ==="
          # After v15 D2', the module must NOT import wakeup_source_add/remove
          # (which have no CRC in our stock-scraped Module.symvers and caused
          # v14's "disagrees about version of symbol wakeup_source_add" reject).
          # It SHOULD import wakeup_source_register/unregister (which do).
          UND_ADD_REMOVE=$(readelf -sW "${KO}" | awk '$7=="UND"{print $8}' \
                   | grep -E '^wakeup_source_(add|remove)$' | sort -u || true)
          UND_REG=$(readelf -sW "${KO}" | awk '$7=="UND"{print $8}' \
                   | grep -E '^wakeup_source_(register|unregister)$' | sort -u || true)
          echo "wake-lock add/remove UND: ${UND_ADD_REMOVE:-<none>}"
          echo "wake-lock reg/unreg UND:  ${UND_REG:-<none>}"
          if [ -n "${UND_ADD_REMOVE}" ]; then
            echo "ERROR: module imports wakeup_source_add/remove."
            echo "ERROR: v15 D2' patch to gl_kal.h didn't take."
            echo "ERROR: on device the kernel will reject the module."
            exit 1
          fi
          if [ -z "${UND_REG}" ]; then
            echo "WARNING: module doesn't import wakeup_source_register/unregister either."
            echo "         Wake-lock code may have been optimised out; not fatal."
          fi

          echo "=== Undefined symbols in final module ==="
          readelf -sW "${KO}" | awk '$7=="UND"{print $8}' | sort -u \
              | tee "${GITHUB_WORKSPACE}/undefined-symbols.txt"

          echo "=== HARD CHECK 5: known-bad imports from prior failed device logs ==="
          BAD='filp_open|kernel_read|kernel_write|kalValidateDevHandler|ioremap_nocache|ioremap_cache|gWifiRsvMemPhyBase|gWifiRsvMemSize|connectivity_flush_dcache_area|connectivity_arch_setup_dma_ops|dma_get_required_mask|get_dma_ops|dma_supported|platform_device_del|rstNotifyWholeChipRstStatus|set_logtoomuch_enable|get_logtoomuch_enable'
          if grep -E "^(${BAD})$" "${GITHUB_WORKSPACE}/undefined-symbols.txt"; then
            echo "ERROR: final module still contains known-bad unresolved imports"
            exit 1
          fi

          echo "=== HARD CHECK 6: no unresolved MODVERSIONS warnings (except wake-lock) ==="
          # We inject placeholder CRCs for wakeup_source_* in D3, so a
          # 'no symbol version for wakeup_source_add' warning is expected
          # and harmless (module still loads). Any OTHER symbol with no
          # CRC is a real problem and must fail the build.
          if grep -inE 'no symbol version for|unknown symbol|undefined!' \
                "${GITHUB_WORKSPACE}/build.log" \
                | grep -viE 'wakeup_source_(add|remove|register|unregister)' \
                > "${GITHUB_WORKSPACE}/modversion-warnings.txt" ; then
            if [ -s "${GITHUB_WORKSPACE}/modversion-warnings.txt" ]; then
              cat "${GITHUB_WORKSPACE}/modversion-warnings.txt"
              echo "ERROR: build produced symbols with no/unknown CRC (other than wake-lock)"
              exit 1
            fi
          fi
          # Also record the wake-lock warnings we deliberately suppressed
          grep -inE 'no symbol version for wakeup_source_' \
                "${GITHUB_WORKSPACE}/build.log" > "${GITHUB_WORKSPACE}/wakelock-warnings.txt" || true

          echo "=== module strings ==="
          strings "${KO}" | grep -E '^(name|depends|license|vermagic)=' || true

          echo "=== ALL v15 HARD CHECKS PASSED ==="

      - name: v15 D5 - Build Magisk flashable module (real overlay)
        run: |
          set -euxo pipefail

          PKG="${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark"
          rm -rf "${PKG}"
          mkdir -p "${PKG}/system/vendor/lib/modules"

          if [ -d "${GITHUB_WORKSPACE}/magisk-module" ]; then
            cp -a "${GITHUB_WORKSPACE}/magisk-module/." "${PKG}/"
          fi

          cat > "${PKG}/module.prop" <<'EOF'
          id=redmi-wifi-monitor-spark
          name=Redmi Spark Built-in WiFi Monitor Mode [v15]
          version=v15.0.0
          versionCode=15000
          author=SurajGupta2009
          description=Radiotap monitor mode for Redmi Pad SE 8.7 4G (spark) via patched wlan_drv_gen4m.ko (CFI-disabled build)
          EOF

          cat > "${PKG}/customize.sh" <<'EOF'
          #!/system/bin/sh
          ui_print "============================================"
          ui_print " Redmi Spark WiFi Monitor v15 (real overlay)"
          ui_print "============================================"
          ui_print ""
          ui_print "This OVERLAYS /system/vendor/lib/modules/wlan_drv_gen4m.ko."
          ui_print ""
          ui_print "If Wi-Fi fails or the tablet bootloops after reboot:"
          ui_print "   Hold Vol Down at boot -> Magisk Safe Mode"
          ui_print "   OR run in Termux:"
          ui_print "   su -c 'rm -rf /data/adb/modules/redmi-wifi-monitor-spark && reboot'"
          ui_print ""
          ui_print "After reboot, verify with:"
          ui_print "   su"
          ui_print "   sh /sdcard/Download/redmi_monitor_test.sh"
          ui_print ""
          ui_print "PASS = iw list shows '* monitor' AND no 'not ready' loop."
          set_perm 0 0 0644 $MODPATH/system/vendor/lib/modules/wlan_drv_gen4m.ko
          EOF

          touch "${PKG}/sepolicy.rule"

          cp "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \
            "${PKG}/system/vendor/lib/modules/wlan_drv_gen4m.ko"
          chmod 0644 "${PKG}/system/vendor/lib/modules/wlan_drv_gen4m.ko"

          cat > "${PKG}/README-INSTALL.txt" <<'EOF'
          Redmi Pad SE 8.7 4G spark v15 Wi-Fi monitor-mode module.

          Recovery:
            su
            rm -rf /data/adb/modules/redmi-wifi-monitor-spark
            reboot
          OR at boot, hold Vol Down for Magisk Safe Mode.

          Verify:
            su
            lsmod | grep wlan
            strings /vendor/lib/modules/wlan_drv_gen4m.ko | grep -iE 'vermagic|radiotap|wlanMon'
            dmesg | grep -iE 'wlan_drv_gen4m|unknown symbol|no symbol version|disagrees|vermagic|radiotap|monitor' | tail -100
            iw list | grep -A30 'Supported interface modes'

          Test monitor:
            su
            iw dev wlan0 interface add mon0 type monitor
            ip link set mon0 up
            iw dev
          EOF

          cd "${PKG}"
          zip -r "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark-v15.zip" .
          ls -lh "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark-v15.zip"

      - name: v15 D5 - Build Magisk flashable module (DIAG-only)
        run: |
          set -euxo pipefail

          # DIAG zip does NOT overwrite /system/vendor/lib/modules.
          # It just installs a Magisk module whose customize.sh copies
          # the patched .ko into /data/local/tmp/. This lets you
          # inspect the file WITHOUT ever loading it. Do NOT try to
          # insmod it manually -- the on-device history is clear that
          # in-flight swap of wlan_drv_gen4m panics the kernel.
          DIAG="${GITHUB_WORKSPACE}/pkg-diag"
          rm -rf "${DIAG}"
          mkdir -p "${DIAG}"

          cat > "${DIAG}/module.prop" <<'EOF'
          id=redmi-wifi-monitor-spark-DIAG
          name=Redmi Spark WiFi Monitor DIAG-only [v15]
          version=v15.0.0-diag
          versionCode=15000
          author=SurajGupta2009
          description=DIAG-only. Drops patched wlan_drv_gen4m.ko to /data/local/tmp/. Does NOT overwrite stock.
          EOF

          # Ship the .ko INSIDE the module folder so it exists after
          # install. customize.sh does the copy to /data/local/tmp
          # at install time.
          mkdir -p "${DIAG}/payload"
          cp "${GITHUB_WORKSPACE}/wlan_drv_gen4m.ko" \
             "${DIAG}/payload/wlan_drv_gen4m_diag.ko"

          cat > "${DIAG}/customize.sh" <<'EOF'
          #!/system/bin/sh
          ui_print "======================================================"
          ui_print " Redmi Spark WiFi Monitor DIAG-only v15"
          ui_print "======================================================"
          ui_print ""
          DEST=/data/local/tmp/wlan_drv_gen4m_diag.ko
          cp $MODPATH/payload/wlan_drv_gen4m_diag.ko $DEST
          chmod 0644 $DEST
          chown root:root $DEST
          ui_print "Copied patched .ko to:"
          ui_print "  $DEST"
          ui_print ""
          ui_print "Inspect only (SAFE) with:"
          ui_print "  su"
          ui_print "  sh /sdcard/Download/redmi_monitor_test.sh \\"
          ui_print "     --diag /data/local/tmp/wlan_drv_gen4m_diag.ko"
          ui_print ""
          ui_print "DO NOT insmod manually - it panics the kernel."
          EOF

          touch "${DIAG}/sepolicy.rule"

          cd "${DIAG}"
          zip -r "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark-v15-DIAG.zip" .
          ls -lh "${GITHUB_WORKSPACE}/redmi-wifi-monitor-spark-v15-DIAG.zip"

      - name: v15 D6 - Upload artifacts (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redmi-spark-radiotap-monitor-build-v15
          path: |
            wlan_drv_gen4m.ko
            wlan_drv_gen4m.unstripped.ko
            redmi-wifi-monitor-spark-v15.zip
            redmi-wifi-monitor-spark-v15-DIAG.zip
            build.log
            readelf-a.txt
            readelf-sW.txt
            readelf-versions.txt
            nm-D.txt
            strings.txt
            undefined-symbols.txt
            modversion-warnings.txt
            wakelock-warnings.txt
            /home/runner/redmi_monitor_build/kernel_spark/out/Module.symvers
            /home/runner/redmi_monitor_build/stock-crc/Module.symvers
          if-no-files-found: warn
          retention-days: 30
