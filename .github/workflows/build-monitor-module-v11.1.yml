id=redmi-wifi-monitor-spark
name=Redmi Spark Built-in WiFi Monitor Mode
version=v11.1.0
versionCode=11100
author=SurajGupta2009
description=Radiotap monitor mode for Redmi Pad SE 8.7 4G (spark) via patched wlan_drv_gen4m.ko
